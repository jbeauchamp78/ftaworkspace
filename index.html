     When loaded with ?demo=1 in the URL (or via the /demo route), we
     synchronously inject demo-api.js BEFORE any other app JS runs, so
     every /api/* fetch call gets routed to in-memory canned data. -->
<script>
  if (true) {
    // Unregister any service worker so it doesn't serve cached /api/ responses
    // from the real backend. SW caches are network-first but the shim must
    // win and the SW interception layer is below the shim.
    /* SW registration stripped from bundle */);
  return out;
}

const TILE_TITLES = {
  "kr-wins":             "KR Wins",
  "kpi-wins":            "KPI Wins",
  "regressions":         "KPI Regressions",
  "missing-pecs":        "Missing PECs",
  "ic-wins":             "Ideal Config Wins",
  "dq-esn":              "ESN Missing / Expired",
  "dq-l1-unknown":       "L1 Status Unknown",
  "dq-l1-no-engstart":   "L1 In Progress w/o Engagement Start",
  "dq-l1-no-target":     "L1 In Progress w/o Target Date",
  "dq-l1-blocked-late":  "L1 Blocked: Next Action Past Due",
};

const DQ_KEY_MAP = {
  "dq-esn":             "esn_missing_or_expired",
  "dq-l1-unknown":      "l1_status_unknown",
  "dq-l1-no-engstart":  "l1_ip_without_engagement_start",
  "dq-l1-no-target":    "l1_ip_without_target_date",
  "dq-l1-blocked-late": "l1_blocked_next_action_late",
};

// Global html-escape helper, used by the drill-panel + cart + AI cards.
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, m =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// Best-effort 2-char initials for the colored-circle fallback avatar that
// renders when a customer has no logo_url. Matches logos.initials_for() in
// the Python module so frontend + backend stay visually consistent.
function _initials(name) {
  if (!name) return '?';
  const toks = String(name).match(/[A-Za-z0-9]+/g) || [];
  if (toks.length === 0) return String(name).substring(0, 2).toUpperCase();
  if (toks.length === 1) return toks[0].substring(0, 2).toUpperCase();
  return (toks[0][0] + toks[1][0]).toUpperCase();
}

// ===== Bridge prompts per tile/row =====
function _bridgePromptFor(tile, row) {
  // row may be {cust, kr, status} (KR-derived) or DQ row {name, entity, id} or IC row {nickname, overall, ...}
  if (tile === "regressions" || tile === "missing-pecs") {
    return { label: `Open PEC · ${row.cust} · ${row.kr}`,
             prompt: `/manage-pecs create ${row.cust} for KR "${row.kr}"`,
             kind: "open-pec", cust: row.cust };
  }
  if (tile === "ic-wins") {
    return { label: `Diagnose Copilot blockers · ${row.nickname}`,
             prompt: `/copilot-blockers ${row.nickname}`,
             kind: "copilot-blockers", cust: row.nickname };
  }
  if (tile === "dq-esn") {
    return { label: `Refresh ESN · ${row.name}`,
             prompt: `/esn-refresh "${row.name}"`,
             kind: "esn-refresh", cust: row.name };
  }
  if (tile === "dq-l1-unknown" || tile === "dq-l1-no-engstart" ||
      tile === "dq-l1-no-target" || tile === "dq-l1-blocked-late") {
    // Single-action skill that walks the whole queue; row-specific arg not needed.
    return { label: `Cleanup L1 intent · ${row.name}`,
             prompt: `/l1-status-unknown`,
             kind: "l1-cleanup", cust: row.name };
  }
  return null;
}

async function _enqueueBridge(payload) {
  const r = await fetch("/api/clawpilot/queue", {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify(payload)
  }).then(x => x.json());
  refreshCartBadge();
  if (window.__api) window.__api.toast(`Queued. ${r.count} pending — open 🛒 to send.`, "ok");
  return r;
}

async function renderDrillPanel(tile) {
  const panel = document.getElementById("drillPanel");
  panel.style.display = "block";

  // Async sources (IC + DQ) — show a loading state, then re-render with real rows.
  if (tile === "ic-wins") {
    panel.innerHTML = `<div class="drill-hdr"><h3>${TILE_TITLES[tile]}</h3>
      <span class="count">…</span>
      <button class="close" id="drillClose" title="Close">×</button></div>
      <div class="drill-list"><div class="drill-empty">Loading Ideal Config rollup…</div></div>`;
    document.getElementById("drillClose").onclick = closeDrill;
    try {
      const r = await fetch("/api/ideal-config/rollup").then(x => x.json());
      const items = r.items || [];
      const nonGreen = items.filter(x => x.overall !== 'green' && x.overall !== 'unknown');
      panel.innerHTML = `
        <div class="drill-hdr"><h3>${TILE_TITLES[tile]}</h3>
          <span class="count">${items.length}</span>
          <button class="close" id="drillClose" title="Close">×</button></div>
        <div class="drill-list">
          ${items.length === 0 ? `<div class="drill-empty">Cache empty — hit the ⟳ on this section to populate.</div>` :
            items.map(it => `
              <div class="drill-item" data-cust="${escapeHtml(it.nickname)}">
                <span class="chip ic-${it.overall}" style="padding: 1px 6px; font-size: 9px;">${it.overall.toUpperCase()}</span>
                <span class="cust">${escapeHtml(it.nickname)}</span>
                <span class="kr">${it.green_count}/${it.total_count} settings green</span>
              </div>`).join("")}
        </div>`;
      document.getElementById("drillClose").onclick = closeDrill;
      panel.querySelectorAll(".drill-item").forEach(el => {
        if (el.dataset.cust) el.onclick = () => _jumpToCustomer(el.dataset.cust);
      });
    } catch (e) {
      panel.innerHTML += `<div class="drill-empty">Failed to load: ${e.message}</div>`;
    }
    return;
  }
  if (tile.startsWith("dq-")) {
    const key = DQ_KEY_MAP[tile];
    panel.innerHTML = `<div class="drill-hdr"><h3>${TILE_TITLES[tile]}</h3>
      <span class="count">…</span>
      <button class="close" id="drillClose" title="Close">×</button></div>
      <div class="drill-list"><div class="drill-empty">Pulling list from FTOP…</div></div>`;
    document.getElementById("drillClose").onclick = closeDrill;
    try {
      const r = await fetch(`/api/counters/dq-list/${key}`).then(x => x.ok ? x.json() : x.json().then(e => Promise.reject(e)));
      const items = r.items || [];
      const isL1 = tile.startsWith("dq-l1-");
      panel.innerHTML = `
        <div class="drill-hdr"><h3>${TILE_TITLES[tile]}</h3>
          <span class="count">${items.length}</span>
          <a href="${r.view_url}" target="_blank" class="drill-ftop-link" title="Open this view in FTOP">↗ Open in FTOP</a>
          ${items.length && !isL1 ? `<button class="drill-bulk-btn" id="drillBulkBtn" title="Queue all">+ Queue all ${items.length}</button>` : ''}
          ${items.length && isL1 ? `<button class="drill-bulk-btn" id="drillBulkBtn" title="Queue one /l1-status-unknown run (covers all rows)">+ Queue cleanup</button>` : ''}
          <button class="close" id="drillClose" title="Close">×</button></div>
        <div class="drill-list">
          ${items.length === 0 ? `<div class="drill-empty">No rows. View is clean.</div>` :
            items.slice(0, 200).map(it => `
              <div class="drill-item">
                <span class="cust">${escapeHtml(it.name)}</span>
                <span class="meta">${escapeHtml(it.extra || '')}</span>
                ${it.id ? `<a href="https://fasttrack365.crm.dynamics.com/main.aspx?pagetype=entityrecord&etn=${it.entity}&id=${it.id}" target="_blank" class="kr">↗ open</a>` : ''}
                ${!isL1 ? `<button class="drill-queue-btn" data-tile="${tile}" data-row='${escapeHtml(JSON.stringify({name: it.name, id: it.id, entity: it.entity}))}' title="Queue fix">+ Queue</button>` : ''}
              </div>
            `).join("")}
        </div>`;
      _wireDrillButtons(panel, tile,
        () => isL1
          ? [{name: "(all rows)"}]   // bulk for L1 is a single /l1-status-unknown run
          : items.map(it => ({name: it.name, id: it.id, entity: it.entity}))
      );
    } catch (e) {
      panel.innerHTML = `<div class="drill-hdr"><h3>${TILE_TITLES[tile]}</h3>
        <button class="close" id="drillClose" title="Close">×</button></div>
        <div class="drill-empty">FTOP fetch failed: ${e.detail || e.message || 'unknown'}. Ensure Edge is running with --remote-debugging-port=9222.</div>`;
      document.getElementById("drillClose").onclick = closeDrill;
    }
    return;
  }

  // Synchronous KR-derived drills (existing behavior)
  const items = getDrillItems(tile);
  const actionable = (tile === "missing-pecs");
  panel.innerHTML = `
    <div class="drill-hdr">
      <h3>${TILE_TITLES[tile]}</h3>
      <span class="count">${items.length}</span>
      ${actionable && items.length ? `<button class="drill-bulk-btn" id="drillBulkBtn" title="Queue Open PEC for every row">+ Queue all ${items.length}</button>` : ''}
      <button class="close" id="drillClose" title="Close">×</button>
    </div>
    <div class="drill-list${actionable ? ' drill-list-stacked' : ''}">
      ${items.length === 0 ? `<div class="drill-empty">No matching rows.</div>` :
        items.map(it => `
          <div class="drill-item" data-cust="${it.cust}">
            <span class="chip ${chipClass(it.status)}" style="padding: 1px 6px; font-size: 9px;">${STATUS_ICONS[it.status]} ${it.status}</span>
            <span class="cust">${it.cust}</span>
            <span class="kr">${it.kr}</span>
            <span class="meta">${it.meta}</span>
            ${actionable ? `<button class="drill-queue-btn" data-tile="${tile}" data-row='${escapeHtml(JSON.stringify({cust: it.cust, kr: it.kr, status: it.status}))}'>+ Queue</button>` : ''}
          </div>
        `).join("")}
    </div>
  `;
  _wireDrillButtons(panel, tile, () => items);
  panel.querySelectorAll(".drill-item").forEach(el => {
    if (el.dataset.cust) el.onclick = (e) => {
      if (e.target.closest(".drill-queue-btn") || e.target.closest("a")) return;
      _jumpToCustomer(el.dataset.cust);
    };
  });
}

function _wireDrillButtons(panel, tile, bulkRowsFn) {
  const closeBtn = document.getElementById("drillClose");
  if (closeBtn) closeBtn.onclick = closeDrill;
  panel.querySelectorAll(".drill-queue-btn").forEach(btn => {
    btn.onclick = async (e) => {
      e.preventDefault(); e.stopPropagation();
      const row = JSON.parse(btn.dataset.row);
      const p = _bridgePromptFor(tile, row);
      if (!p) return;
      await _enqueueBridge(p);
      btn.disabled = true;
      btn.textContent = "✓ queued";
    };
  });
  const bulkBtn = panel.querySelector("#drillBulkBtn");
  if (bulkBtn) bulkBtn.onclick = async (e) => {
    e.preventDefault(); e.stopPropagation();
    const rows = bulkRowsFn();
    // L1 cleanup is a single skill run regardless of row count — dedupe.
    const seen = new Set();
    let added = 0;
    for (const row of rows) {
      const p = _bridgePromptFor(tile, row);
      if (!p) continue;
      if (seen.has(p.prompt)) continue;
      seen.add(p.prompt);
      await _enqueueBridge(p);
      added++;
    }
    bulkBtn.disabled = true;
    bulkBtn.textContent = `✓ queued ${added}`;
  };
}

function _jumpToCustomer(cust) {
  window.activeCust = cust;
  localStorage.setItem("fta-workspace-active-cust", cust);
  document.querySelectorAll(".tab").forEach(x => x.classList.toggle("active", x.dataset.tab === "detail"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("active", p.dataset.panel === "detail"));
  renderSidebar(); renderContent();
}

function closeDrill() {
  document.getElementById("drillPanel").style.display = "none";
  document.querySelectorAll(".counter.active").forEach(c => c.classList.remove("active"));
  window.activeTile = null;
}

window.activeTile = null;
// ===== Open PEC button: queue a Clawpilot /manage-pecs action via shared confirm =====
document.addEventListener("click", async e => {
  const btn = e.target.closest(".pec-open-btn");
  if (!btn) return;
  e.preventDefault();
  e.stopPropagation();
  const cust = btn.dataset.cust;
  const kr   = btn.dataset.kr;
  const result = await window.__queueSkill.queueSkill("manage-pecs-create", {
    cust, kr_label: kr,
  });
  if (result.ok) btn.classList.add("queued");
});

// ===== Clawpilot Cart inline panel (between topbar and counter row) =====
async function refreshCartBadge() {
  try {
    const r = await fetch("/api/clawpilot/queue").then(x => x.json());
    const badge = document.getElementById("cartBadge");
    const cartBtn = document.getElementById("btnCart");
    if (!badge) return;
    const pending = r.count || 0;
    const running = r.running_count || 0;
    const needsUser = r.needs_user_count || 0;
    const autoSafe = r.auto_safe_count || 0;
    const total = pending + running;
    // Detect transitions: if previous run had pending/running items and now
    // total has dropped, the heartbeat (or manual run) completed work.
    const prev = window.__cartPrev || { pending: 0, running: 0, completedToday: r.completed_today || 0 };
    const completedToday = r.completed_today || 0;
    if (prev.pending + prev.running > 0 && total < (prev.pending + prev.running)) {
      const delta = (prev.pending + prev.running) - total;
      if (window.__api) {
        window.__api.toast(`Heartbeat processed ${delta} cart item${delta > 1 ? 's' : ''}.`, "ok");
      }
      if (typeof updateCounters === "function") updateCounters();
    }
    window.__cartPrev = { pending, running, completedToday };
    if (total > 0) {
      let txt = String(pending);
      if (running > 0) txt = `${pending}+${running}⟳`;
      if (needsUser > 0) txt = `${pending} · ${needsUser}▶`;
      badge.textContent = txt;
      badge.style.display = "inline-flex";
      badge.classList.toggle("running", running > 0);
      badge.classList.toggle("needs-user", needsUser > 0);
    } else {
      badge.style.display = "none";
      badge.classList.remove("running");
      badge.classList.remove("needs-user");
    }
    const autoState = (document.getElementById("autoState") || {}).textContent || "?";
    const autoOff = autoState === "OFF";
    if (cartBtn) cartBtn.classList.toggle("auto-off-warn", autoOff && autoSafe > 0);
    // Stash heartbeat info for renderCartInline to surface in the cart header.
    window.__lastHeartbeat = {
      iso: r.last_heartbeat_iso,
      summary: r.last_heartbeat_summary,
      nextIso: r.next_heartbeat_iso,
      autoState,
      autoSafe,
      needsUser,
    };
    // If cart panel is open, also re-render so the countdown stays fresh.
    const panel = document.getElementById("cartInlinePanel");
    if (panel && !panel.hasAttribute("hidden") && typeof renderCartInline === "function") {
      // Only re-render the header bits to avoid blowing away in-flight clicks
      _updateCartHeaderCountdown();
      // Auto-collapse: if user isn't actively interacting (hovering or
      // focused inside the panel), close it on the next poll. Items remain
      // safely in the cart — the topbar badge shows the count + needs-user
      // chip — so the FTA can reopen anytime.
      const userBusy = panel.matches(":hover") || panel.contains(document.activeElement);
      if (!userBusy) {
        window.toggleCart();
      }
    }
    // While items are running, poll faster so the badge feels live.
    const desiredInterval = running > 0 ? 4000 : 15000;
    if (window.__cartBadgeInterval !== desiredInterval) {
      if (window.__cartBadgeTimer) clearInterval(window.__cartBadgeTimer);
      window.__cartBadgeTimer = setInterval(refreshCartBadge, desiredInterval);
      window.__cartBadgeInterval = desiredInterval;
    }
  } catch (e) { /* silent */ }
}

// Compute the "next heartbeat in ~X min" countdown — always shown (when auto is on).
// "Needs you" surfaces in a separate cart-hdr chip below, not in this pill.
function _cartCountdownText(hb) {
  const autoOff = hb.autoState === "OFF";
  if (autoOff) {
    return { text: "Auto OFF — heartbeat paused", cls: "auto-off" };
  }
  if (hb.nextIso) {
    try {
      const iso = /(Z|[+\-]\d{2}:?\d{2})$/.test(hb.nextIso) ? hb.nextIso : hb.nextIso.replace(" ", "T") + "Z";
      let next = new Date(iso);
      const now = new Date();
      while (next < now) next = new Date(next.getTime() + 30 * 60000);
      const mins = Math.max(0, Math.round((next - now) / 60000));
      if (mins <= 0) return { text: "⏱ next heartbeat any moment", cls: "idle" };
      if (mins === 1) return { text: "⏱ next heartbeat in ~1 min", cls: "idle" };
      return { text: `⏱ next heartbeat in ~${mins} min`, cls: "idle" };
    } catch { return { text: "", cls: "idle" }; }
  }
  // No heartbeat yet — fall back to a static label so the pill still shows.
  return { text: "⏱ next heartbeat within 30 min", cls: "idle" };
}

function _updateCartHeaderCountdown() {
  const el = document.getElementById("cartHeaderCountdown");
  if (!el) return;
  const hb = window.__lastHeartbeat || {};
  const r = _cartCountdownText(hb);
  el.textContent = r.text;
  el.className = "cart-hdr-countdown " + r.cls;
  el.style.display = r.text ? "inline" : "none";
}

window.toggleCart = async function () {
  const panel = document.getElementById("cartInlinePanel");
  if (!panel) return;
  if (!panel.hasAttribute("hidden")) {
    panel.setAttribute("hidden", "");
    panel.innerHTML = "";
    if (window.__cartPollTimer) { clearInterval(window.__cartPollTimer); window.__cartPollTimer = null; }
    return;
  }
  await renderCartInline();
  panel.removeAttribute("hidden");
  // While the panel is open, poll every 4s so running rows transition live.
  if (window.__cartPollTimer) clearInterval(window.__cartPollTimer);
  window.__cartPollTimer = setInterval(() => {
    if (panel.hasAttribute("hidden")) {
      clearInterval(window.__cartPollTimer);
      window.__cartPollTimer = null;
      return;
    }
    renderCartInline();
  }, 30000);
};

async function renderCartInline() {
  const panel = document.getElementById("cartInlinePanel");
  if (!panel) return;
  let r;
  try {
    r = await fetch("/api/clawpilot/queue").then(x => x.json());
  } catch (e) {
    panel.innerHTML = `<div class="cart-inline-card"><div class="cart-empty">Failed to load: ${e.message}</div></div>`;
    return;
  }
  const pending   = r.pending || [];
  const running   = r.running || [];
  const completed = r.completed || r.processed || [];
  const esc = (s) => (s == null ? "" : String(s).replace(/[&<>'"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c])));
  const fmtTime = ts => {
    if (!ts) return "";
    try {
      const d = new Date(ts.replace(" ", "T") + "Z");
      return d.toLocaleTimeString([], {hour: "numeric", minute: "2-digit"});
    } catch { return ts; }
  };
  const rowHtml = (it, kind) => {
    let dot, dotCls, removeBtn = "", time = "", extra = "", approveBtn = "";
    const needsUser = !!it.requires_user_confirm;
    if (kind === "pending") {
      dot = "●"; dotCls = "pending";
      time = fmtTime(it.created_at);
      removeBtn = `<button class="cart-remove" data-id="${it.id}" title="Remove">×</button>`;
      if (needsUser) {
        dot = "▶"; dotCls = "needs-user";
        extra = ` <span class="cart-flag needs-user">▶ needs you</span>`;
        approveBtn = `<button class="cart-approve" data-id="${it.id}" title="Approve this item so the next 30-min heartbeat will run it. The skill itself may still ask for its own confirms in Clawpilot when it executes.">✓ Approve</button>`;
      } else if (it.status === "sent") {
        dot = "→"; dotCls = "sent";
        extra = ` <span class="cart-flag">awaiting Clawpilot</span>`;
      } else {
        // approved item awaiting heartbeat — show a check chip
        dot = "✓"; dotCls = "approved";
        extra = ` <span class="cart-flag approved">✓ approved · next heartbeat</span>`;
      }
    } else if (kind === "running") {
      dot = "⟳"; dotCls = "running";
      time = fmtTime(it.started_at || it.sent_at);
      extra = ` <span class="cart-flag running">running…</span>`;
    } else if (kind === "succeeded") {
      dot = "✓"; dotCls = "done";
      time = fmtTime(it.completed_at);
      if (it.summary) extra = `<div class="cart-summary">${esc(it.summary)}</div>`;
    } else if (kind === "failed") {
      dot = "✗"; dotCls = "failed";
      time = fmtTime(it.completed_at);
      extra = `<div class="cart-summary failed">${esc(it.summary || "Failed.")}</div>`;
    }
    return `
      <div class="cart-row cart-row-${kind}${needsUser && kind === 'pending' ? ' needs-user' : ''}" data-id="${it.id}">
        <span class="cart-status-dot ${dotCls}">${dot}</span>
        <div class="cart-row-main">
          <span class="cart-kind">${esc(it.kind)}${extra}</span>
          <span class="cart-label">${esc(it.label)}</span>
          <code class="cart-prompt">${esc(it.prompt)}</code>
        </div>
        <span class="cart-time">${time}</span>
        ${approveBtn}
        ${removeBtn}
      </div>`;
  };
  const succeeded = completed.filter(c => c.status === "succeeded");
  const failed    = completed.filter(c => c.status === "failed");

  // Empty-state hint for RUNNING column: last heartbeat result
  let runningEmpty = `<div class="cart-empty cart-empty-small">No bridge actions in flight.</div>`;
  const hb = window.__lastHeartbeat || {};
  if (hb.iso) {
    try {
      const iso = /(Z|[+\-]\d{2}:?\d{2})$/.test(hb.iso) ? hb.iso : hb.iso.replace(" ", "T") + "Z";
      const d = new Date(iso);
      const time = d.toLocaleTimeString([], {hour: "numeric", minute: "2-digit"});
      const ok = (hb.summary && hb.summary.ok) || 0;
      const bad = (hb.summary && hb.summary.failed) || 0;
      let resultTxt = "";
      if (ok + bad > 0) resultTxt = ` — ${ok} succeeded${bad ? `, ${bad} failed` : ""}`;
      runningEmpty = `<div class="cart-empty cart-empty-small">No bridge actions in flight.<br><span class="muted" style="font-size:11px;">Last heartbeat: ${time}${resultTxt}</span></div>`;
    } catch {}
  }
  const autoOff = (hb.autoState === "OFF");

  panel.innerHTML = `

// Daily MIDAS snapshot-date check. Pings the lightweight backend endpoint
// once per page-day so the topbar's "MIDAS snapshot:" stays current even if
// the user doesn't hit Refresh Now. Runs once 30s after load (to avoid
// competing with startup), then every 24h. Tracks last run in localStorage
// so refreshing the page doesn't re-trigger the check unnecessarily.
async function _midasDailyCheck() {
  try {
    await fetch("/api/midas/snapshot-check").then(x => x.json());
    localStorage.setItem("fta-workspace-midas-check", new Date().toISOString());
    // Re-pull tracker meta so the UI picks up any new snapshot date.
    const tr = await fetch("/api/tracker").then(x => x.json());
    if (tr && tr.meta && window.__api && typeof updateMeta === "function") {
      updateMeta(tr.meta);
    } else if (tr && tr.meta) {
      const el = document.getElementById("midasSnap");
      if (el && tr.meta.snapshot_iso) {
        const m = String(tr.meta.snapshot_iso).match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (m) {
          const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
          const y = parseInt(m[1],10), mo = parseInt(m[2],10), d = parseInt(m[3],10);
          const snapDate = new Date(y, mo-1, d);
          const today = new Date(); today.setHours(0,0,0,0);
          el.textContent = snapDate.getTime() > today.getTime()
            ? `${MONTHS[mo-1]} ${y} (in progress)`
            : `${MONTHS[mo-1]} ${d} ${y}`;
        }
      }
    }
  } catch (e) { /* silent */ }
}
(function _scheduleMidasDailyCheck() {
  const last = localStorage.getItem("fta-workspace-midas-check");
  const lastMs = last ? new Date(last).getTime() : 0;
  const ageHrs = (Date.now() - lastMs) / 3600000;
  // First check: 30s after load if we haven't checked in the last 24h.
  if (ageHrs >= 24 || !last) {
    setTimeout(_midasDailyCheck, 30000);
  }
  // Subsequent: every 24h while the tab is open.
  setInterval(_midasDailyCheck, 24 * 60 * 60 * 1000);
})();

// ===== Anonymous usage telemetry =====
// Fires fire-and-forget events to the backend. Backend writes anonymous
// install_id + event_type + ts to a shared OneDrive CSV. NO FTA name, email,
// tenant, or customer data is ever recorded. Throttles "open" events to at
// most one per 5 minutes per browser session so a F5 spree doesn't spam.
function _telemetry(eventType, extra) {
  try {
    const custCount = (window.CUSTOMERS && window.CUSTOMERS.length) || 0;
    fetch("/api/telemetry/event", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        event_type: eventType,
        customer_count: custCount,
        extra: extra || "",
      }),
    }).catch(() => {/* silent — telemetry must never break the UI */});
  } catch (e) { /* silent */ }
}
(function _fireOpenEvent() {
  // Throttle: one "open" per 5 min per browser to avoid F5 inflation.
  const last = parseInt(sessionStorage.getItem("fta-workspace-open-ts") || "0", 10);
  if (Date.now() - last < 5 * 60 * 1000) return;
  sessionStorage.setItem("fta-workspace-open-ts", String(Date.now()));
  // Fire after CUSTOMERS is populated so customer_count is accurate.
  setTimeout(() => _telemetry("open"), 2000);
})();

document.addEventListener("blur", e => {

    const raw = (e.target.textContent || "").trim();

    if (c) c.tpid = digits;
    fetch(`/api/customer/${encodeURIComponent(nick)}/tpid`, {
      method: 'PATCH', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ tpid: digits || null })
    }).then(r => {
      if (!r.ok && window.__api) window.__api.toast('TPID save failed', 'err');
    });
    return;
  }
  // Editable customer display nickname (header)
  if (e.target.classList.contains("cust-display-name")) {
    const nick = e.target.dataset.cust;
    const fallback = e.target.dataset.fallback || "";
    const c = CUSTOMERS.find(x => x.n === nick);
    if (!c) return;
    const newVal = e.target.textContent.trim();
    const effective = newVal || fallback;
    // If user cleared the field, restore the FTOP name as visible text
    if (!newVal) e.target.textContent = fallback;
    c.custom_nick = newVal || "";
    c.display = effective;
    fetch(`/api/customer/${encodeURIComponent(nick)}/display`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ display_nickname: newVal || null }),

    }).catch(err => {
      if (window.__api) window.__api.toast('Save error: ' + err.message, 'err');
    });
    return;
  }
  // FTA Notes (per-customer free text)
  if (e.target.classList.contains("fta-notes-area")) {
    const cust = e.target.dataset.cust;
    const value = e.target.value;
    const c = CUSTOMERS.find(x => x.n === cust);
    if (c) c.fta_notes = value;
    fetch(`/api/customer/${encodeURIComponent(cust)}/notes`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ fta_notes: value || null }),
    }).then(r => {
      if (!r.ok && window.__api) window.__api.toast('FTA Notes save failed', 'err');
    }).catch(err => {
      if (window.__api) window.__api.toast('Notes save error: ' + err.message, 'err');
    });
    return;
  }
  // Ideal Config notes — distinct endpoint
  if (e.target.classList.contains("ic-note")) {
    const cust = e.target.dataset.cust;
    const sid = e.target.dataset.icSetting;
    const value = e.target.textContent.trim();
    fetch(`/api/customer/${encodeURIComponent(cust)}/ideal-config/notes`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ setting_id: sid, notes: value || null }),
    }).then(r => {
      if (!r.ok && window.__api) window.__api.toast('Ideal Config note save failed', 'err');
    }).catch(err => {
      if (window.__api) window.__api.toast('Note save error: ' + err.message, 'err');
    });
    return;

  if (e.target.classList.contains("notes")) {
    const custName = e.target.dataset.cust;
    const krIdx = parseInt(e.target.dataset.kr, 10);
    const c = CUSTOMERS.find(x => x.n === custName);
    if (c) c.krs[krIdx].n = e.target.textContent.trim();
    if (window.__api) window.__api.saveKr(custName, krIdx, { kr_notes: e.target.textContent.trim() });

  if (e.target.classList.contains("todo-label") || e.target.classList.contains("todo-notes")) {

    const todoIdx = parseInt(e.target.dataset.todo, 10);

// =====================================================================
// V3 API HYDRATION LAYER — replaces the sample data with backend reality.
// =====================================================================
window.__api = (function() {
  const KR_INDEX_TO_LABEL = KR_LABELS.map(r => r[0]);
  const KR_LABEL_TO_INDEX = {};
  KR_INDEX_TO_LABEL.forEach((lab, i) => KR_LABEL_TO_INDEX[lab] = i);

  function toast(msg, cls = "") {
    const t = document.getElementById("toast");
    if (!t) return;
    t.textContent = msg;
    t.style.color = cls === "ok" ? "var(--cp-success)"
                  : cls === "err" ? "var(--cp-danger)"
                  : "var(--cp-text-muted)";
    if (cls === "ok" || cls === "err") {
      clearTimeout(toast._t);
      toast._t = setTimeout(() => { t.textContent = ""; }, 3500);
    }
  }

  async function call(method, path, body) {
    const opts = { method, headers: {} };
    if (body !== undefined) {
      opts.headers["Content-Type"] = "application/json";
      opts.body = JSON.stringify(body);
    }
    const r = await fetch(path, opts);
    if (!r.ok) {
      let detail = r.statusText;
      try { detail = (await r.json()).detail || detail; } catch {}
      throw new Error(`${r.status} ${detail}`);
    }
    return await r.json();
  }

  // Transform backend tracker -> mockup's CUSTOMERS shape (n/full/tpid/krs[15]).
  function transformTracker(state) {
    const out = [];
    for (const cust of state.customers || []) {
      const krsByLabel = {};
      for (const kr of cust.kr_status || []) krsByLabel[kr.kr_label] = kr;
      const krs = KR_INDEX_TO_LABEL.map(lab => {
        const k = krsByLabel[lab];
        if (!k) return { s: "N/A", b: null, c: null, prev: null, g: null, p: null, n: "",
                         mom_pct: null, mom_abs: null, mau_curr: null, mau_prev: null };
        return {
          s: (k.status || "N/A").toUpperCase(),
          as: (k.auto_status || "").toUpperCase() || null,
          b: k.baseline_value,
          c: k.current_value,
          prev: k.prev_month_value,
          g: k.fy_growth,
          p: (k.pec_flag && k.pec_flag.toLowerCase() === "yes") ? "Yes" : null,
          n: k.kr_notes || "",
          edited: k.source === "manual",
          // MoM-MAU derived fields (computed at API time from kr_status_history)
          mom_pct:  k.mom_pct,
          mom_abs:  k.mom_abs,
          mau_curr: k.mau_curr,
          mau_prev: k.mau_prev,
        };
      });
      out.push({
        n: cust.nickname,
        full: cust.full_name || cust.nickname,
        display: cust.display_nickname || cust.full_name || cust.nickname,
        custom_nick: cust.display_nickname || "",
        tpid: cust.tpid || "",
        ftop_account_id: cust.ftop_account_id || null,
        fta_notes: cust.fta_notes || "",
        pec_active: cust.pec_active_count || 0,
        pec_closed: cust.pec_closed_count || 0,
        pec_total:  cust.pec_total_count || 0,
        logo_url:   cust.logo_url || "",
        logo_source: cust.logo_source || "",
        ftop_defaultdomain: cust.ftop_defaultdomain || "",
        krs,
        _todos: (cust.todos || []).map(t => ({
          slot: t.slot, label: t.label || "", status: t.status || "NOT STARTED", notes: t.notes || ""
        })),
      });
    }
    return out;
  }

  // Replace mockup's TODOS storage with our backend-backed values.
  function hydrateTodos(custList) {
    window.todosByCust = window.todosByCust || {};
    const TODO_DEFAULT = (typeof TODO_LABELS !== "undefined" ? TODO_LABELS : [])
      .map(l => ({ label: l, status: "NOT STARTED", notes: "" }));
    for (const c of custList) {
      const rows = TODO_DEFAULT.slice();
      for (const t of (c._todos || [])) {
        const i = t.slot;
        if (i >= 0 && i < rows.length) rows[i] = { label: t.label, status: t.status, notes: t.notes };
      }
      window.todosByCust[c.n] = rows;
    }
  }

  function updateMeta(meta) {
    const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const fmtSnap = (s) => {
      if (!s) return "—";
      // MIDAS labels the in-progress month with the end-of-month date
      // (e.g. on June 18 the latest snapshot is "2026-06-30"). For future
      // dates, render as "Month YYYY (in progress)" so users don't think
      // we're showing a future-dated reading.
      const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (!m) return s;
      const y = parseInt(m[1], 10);
      const mo = parseInt(m[2], 10);
      const d = parseInt(m[3], 10);
      const snapDate = new Date(y, mo - 1, d);
      const today = new Date(); today.setHours(0,0,0,0);
      if (snapDate.getTime() > today.getTime()) {
        return `${MONTHS[mo - 1]} ${y} (in progress)`;
      }
      return `${MONTHS[mo - 1]} ${d} ${y}`;
    };
    const fmtTs = (s) => {
      if (!s) return "—";
      // Parse as local datetime ("2026-06-16T21:36:08" stored without TZ -> treat as local)
      try {
        const d = new Date(s);
        if (isNaN(d.getTime())) return s;
        const today = new Date();
        const sameDay = d.toDateString() === today.toDateString();
        const time = d.toLocaleTimeString([], {hour:"numeric", minute:"2-digit"});
        return sameDay ? `today, ${time}` : d.toLocaleDateString([], {month:"short", day:"numeric"}) + ` · ${time}`;
      } catch { return s; }
    };
    const snapTxt = fmtSnap(meta.snapshot_iso);
    const tsTxt = fmtTs(meta.last_refresh_iso);
    const el = document.getElementById("lastRefresh");
    if (el) el.textContent = tsTxt;
    const snap = document.getElementById("midasSnap");
    if (snap) snap.textContent = snapTxt;
    const tb = document.getElementById("topbarMeta");
    if (tb && meta.fta_name) {
      const SNAP_TIP = "MIDAS labels each monthly snapshot with that month's end-of-month date. Today's reading sits in an in-progress bucket (e.g., June data is stamped 2026-06-30 throughout June, then finalizes on Jul 1). The data is current; only the date label is forward-dated.";
      tb.innerHTML = `${meta.fta_name} · <span title="${SNAP_TIP}">MIDAS snapshot:</span> <strong id="midasSnap" title="${SNAP_TIP}">${snapTxt}</strong> · Last refresh: <strong id="lastRefresh">${tsTxt}</strong>`;
    }
  }

  // Memoize the last counter values so we can detect what changed on the
  // next refresh and flash those tiles. Keyed by the value-cell selector.
  const _lastCounterValues = {};
  // True on the first updateCounters() call — suppresses flashes when the
  // page first loads (everything has "changed" from nothing, which would
  // be visual noise).
  let _counterFirstLoad = true;

  function _flashCounter(selector, newValue) {
    const cell = document.querySelector(selector);
    if (!cell) return;
    const newStr = String(newValue);
    const prev = _lastCounterValues[selector];
    _lastCounterValues[selector] = newStr;
    cell.textContent = newStr;
    if (_counterFirstLoad) return;
    if (prev === undefined || prev === newStr) return;
    const tile = cell.closest(".counter");
    if (!tile) return;
    // Restart animation: remove → reflow → re-add.
    tile.classList.remove("flash", "recent-update");
    void tile.offsetWidth;
    tile.classList.add("flash");
    // After the 1.2s flash, settle to the "recently updated" tint that
    // persists until the next updateCounters call clears it.
    setTimeout(() => {
      tile.classList.remove("flash");
      tile.classList.add("recent-update");
    }, 1250);
  }

  async function updateCounters() {
    try {
      const c = await call("GET", "/api/counters");
      // At the start of each refresh, clear the lingering "recent-update"
      // tints from the previous cycle so only this cycle's changes glow.
      document.querySelectorAll(".counter.recent-update")
        .forEach(el => el.classList.remove("recent-update"));
      // KR Status
      _flashCounter('#ct-customers',     c.customers);
      _flashCounter('#ct-kr-wins',       c.kr_status.total_kr_wins);
      _flashCounter('#ct-kpi-wins',      c.kr_status.total_kpi_wins);
      _flashCounter('#ct-kpi-regr',      c.kr_status.kpi_regressions);
      _flashCounter('#ct-missing-pecs',  c.kr_status.missing_pecs);
      // Ideal Config rollup — show wins only
      const ic = c.ideal_config || {wins:0,total:0};
      const totalCusts = c.customers || 0;
      _flashCounter('#ct-ic-wins',  ic.wins);
      const hint = document.querySelector('#ct-ic-hint');
      if (hint) hint.textContent = ic.total === 0
        ? 'run refresh to populate'
        : `of ${totalCusts} customers GREEN`;
      // Spotlights — show published count only
      const sp = c.spotlights || {published:0, recommended:0, in_flight:0, customers_with_spotlight:0};
      _flashCounter('#ct-sp-wins', sp.published);
      const spHint = document.querySelector('#ct-sp-hint');
      if (spHint) spHint.textContent = sp.in_flight > 0
        ? `${sp.in_flight} in flight · ${sp.customers_with_spotlight} customers`
        : (sp.customers_with_spotlight > 0
            ? `${sp.customers_with_spotlight} customers w/ spotlight`
            : 'published this FY');
      // Data Quality
      _flashCounter('#ct-dq-esn',              c.data_quality.esn_missing_or_expired);
      _flashCounter('#ct-dq-l1-unknown',       c.data_quality.l1_status_unknown);
      _flashCounter('#ct-dq-l1-no-engstart',   c.data_quality.l1_ip_without_engagement_start);
      _flashCounter('#ct-dq-l1-no-target',     c.data_quality.l1_ip_without_target_date);
      _flashCounter('#ct-dq-l1-blocked-late',  c.data_quality.l1_blocked_next_action_late);
      // Mark first-load complete so subsequent refreshes flash on changes.
      _counterFirstLoad = false;
    } catch (e) { console.warn("counter fetch failed:", e); }
  }

  async function load() {
    toast("loading…");
    const state = await call("GET", "/api/tracker");
    const list = transformTracker(state);
    CUSTOMERS.length = 0;
    list.forEach(c => CUSTOMERS.push(c));
    hydrateTodos(list);
    updateMeta(state.meta || {});
    // Pick a sensible default customer if the saved one no longer exists.
    if (!CUSTOMERS.some(c => c.n === window.activeCust)) {
      window.activeCust = CUSTOMERS[0] ? CUSTOMERS[0].n : null;
    }
    renderSidebar();
    renderContent();
    await updateCounters();
    toast("ready", "ok");
  }

  // Debounced save helpers.
  const _saveTimers = new Map();
  function _debouncedSave(key, fn, ms) {
    if (_saveTimers.has(key)) clearTimeout(_saveTimers.get(key));
    _saveTimers.set(key, setTimeout(fn, ms));
  }

  async function saveKr(custName, krIdx, fields) {
    const label = KR_INDEX_TO_LABEL[krIdx];
    if (!label) return;
    const key = `kr|${custName}|${label}|${Object.keys(fields).join(",")}`;
    _debouncedSave(key, async () => {
      try {
        await call("PATCH", "/api/kr", { nickname: custName, kr_label: label, fields });
        toast(`Saved ${custName} / ${label}`, "ok");
      } catch (e) { toast(`Save failed: ${e.message}`, "err"); }
    }, 350);
  }

  async function saveKrImmediate(custName, krIdx, fields) {
    const label = KR_INDEX_TO_LABEL[krIdx];
    if (!label) return;
    try {
      const r = await call("PATCH", "/api/kr",
                           { nickname: custName, kr_label: label, fields });
      toast(`Saved ${custName} / ${label}`, "ok");
      // Mirror the manual badge state back into local data.
      const c = CUSTOMERS.find(x => x.n === custName);
      if (c && c.krs[krIdx]) c.krs[krIdx].edited = (r.source === "manual");
    } catch (e) { toast(`Save failed: ${e.message}`, "err"); }
  }

  async function saveTodo(custName, slot, fields) {
    const key = `todo|${custName}|${slot}|${Object.keys(fields).join(",")}`;
    _debouncedSave(key, async () => {
      try {
        await call("PATCH", "/api/todo", { nickname: custName, slot, fields });
      } catch (e) { toast(`Todo save failed: ${e.message}`, "err"); }
    }, 350);
  }

  // Topbar buttons.
  function wireTopbar() {
    const _spin = (btn) => { btn && btn.classList.add("spinning"); };
    const _stop = (btn) => { btn && btn.classList.remove("spinning"); };
    const refresh = document.getElementById("btnRefresh");
    if (refresh) refresh.onclick = async () => {
      refresh.disabled = true;
      _telemetry("refresh");
      // Step 1 — health check (folded in from the old Verify button).
      // If health fails the refresh would fail too; surface the cause early.
      try {
        const h = await call("GET", "/api/health");
        toast(`✓ Verified · ${h.customer_count} customers · schema v${h.schema_version} — starting refresh… (~60s)`);
      } catch (e) {
        toast("Health check failed: " + e.message, "err");
        refresh.disabled = false;
        return;
      }
      try {
        const r = await call("POST", "/api/refresh", {});
        const sources = r.sources || {};
        const srcLine = Object.entries(sources)
          .map(([k, v]) => `${v.ok ? "✓" : "✗"} ${k}`)
          .join(" · ");
        const queued = r.auto_queued || [];
        let toastMsg = `Refreshed: ${r.customers_evaluated} customers · ${r.krs_updated} KRs updated · MIDAS @ ${r.latest_midas_date}`;
        if (queued.length) {
          toastMsg += ` · 🛒 ${queued.length} skills auto-queued`;
        }
        toast(toastMsg, "ok");
        console.log("[refresh] sources:", srcLine);
        if (queued.length) console.log("[refresh] auto-queued:", queued);
        await load();
        refreshCartBadge();
      } catch (e) {
        let msg = e.message;
        if (/Edge|MIDAS|FTOP|502/i.test(msg)) msg += " — Edge must be running with --remote-debugging-port=9222 + signed in to fasttrack365.";
        toast(msg, "err");
      } finally { refresh.disabled = false; }
    };

    // Automation status probe (no visible button — Auto toggle removed).
    // Writes state into a hidden #autoState element so refreshCartBadge can
    // still surface "Auto OFF — items will wait" warnings on the Pending badge.
    let hiddenAuto = document.getElementById("autoState");
    if (!hiddenAuto) {
      hiddenAuto = document.createElement("span");
      hiddenAuto.id = "autoState";
      hiddenAuto.style.display = "none";
      document.body.appendChild(hiddenAuto);
    }
    const refreshAutoState = async () => {
      try {
        const r = await fetch("/api/automation/status").then(x => x.json());
        hiddenAuto.textContent = r.state === "on" ? "ON" : (r.state === "off" ? "OFF" : "?");
      } catch (e) {}
    };
    refreshAutoState();
    setInterval(refreshAutoState, 30000);

    const themeSelect = document.getElementById("themeSelect");
    const VALID_THEMES = ["light", "dark", "workspace", "blossom", "win98", "storm"];
    const DEFAULT_THEME = "workspace";
    function applyTheme(t, persist = true) {
      if (!VALID_THEMES.includes(t)) t = DEFAULT_THEME;
      document.documentElement.setAttribute("data-theme", t);
      if (themeSelect) themeSelect.value = t;
      if (persist) localStorage.setItem("fta-workspace-theme", t);
    }
    if (themeSelect) themeSelect.onchange = () => applyTheme(themeSelect.value);
    // Apply saved theme; if none, fall back to Workspace default but DON'T
    // persist it — first explicit user pick is what gets locked in.
    const savedTheme = localStorage.getItem("fta-workspace-theme");
    if (savedTheme) applyTheme(savedTheme);
    else applyTheme(DEFAULT_THEME, false);

    // Per-section refresh buttons (3-section counter row)
    const rRoster = document.getElementById("btnRefreshRoster");
    if (rRoster) rRoster.onclick = async (e) => {
      e.stopPropagation();
      _spin(rRoster); toast("refreshing roster…");
      try {
        const r = await call("POST", "/api/counters/refresh-roster");
        toast(`roster: ${r.customers} customers · +${r.added} -${r.removed}`, "ok");
        await load();
      } catch (e) { toast(e.message, "err"); }
      finally { _stop(rRoster); }
    };
    const rKR = document.getElementById("btnRefreshKR");
    if (rKR) rKR.onclick = async (e) => {
      e.stopPropagation();
      _spin(rKR); toast("Pulling fresh MIDAS+FTOP+Lynx data… (~30s)");
      try {
        const r = await call("POST", "/api/refresh", {});
        toast(`KR + Ideal Config refreshed: ${r.customers_evaluated} customers · MIDAS @ ${r.latest_midas_date}`, "ok");
        await load();
      } catch (e) {
        let msg = e.message;
        if (/Edge|MIDAS|FTOP|502/i.test(msg)) msg += " — Edge must be running with --remote-debugging-port=9222 + signed in to fasttrack365.";
        toast(msg, "err");
      } finally { _stop(rKR); }
    };
    const rDQ = document.getElementById("btnRefreshDQ");
    if (rDQ) rDQ.onclick = async (e) => {
      e.stopPropagation();
      _spin(rDQ); toast("Re-counting Data Quality from FTOP…");
      try {
        await call("POST", "/api/counters/refresh-dq");
        await updateCounters();
        toast("DQ refreshed", "ok");
      } catch (e) {
        let msg = e.message;
        if (/Edge|MIDAS|FTOP|502/i.test(msg)) msg += " — Edge must be running with --remote-debugging-port=9222.";
        toast(msg, "err");
      }
      finally { _stop(rDQ); }
    };

    // Run /dq-refresh via the shared queue-confirm modal.
    const rRunDq = document.getElementById("btnRunDqSkill");
    if (rRunDq) rRunDq.onclick = async (e) => {
      e.stopPropagation();
      _spin(rRunDq);
      try {
        await window.__queueSkill.queueSkill("dq-refresh", {});
      } finally { _stop(rRunDq); }
    };
  }

  // Patch the existing change-handler so status flips also POST to the backend.
  document.addEventListener("change", e => {
    if (e.target.classList && e.target.classList.contains("status-select")) {
      const custName = e.target.dataset.cust;
      const krIdx = parseInt(e.target.dataset.kr, 10);
      saveKrImmediate(custName, krIdx, { status: e.target.value });
      return;
    }
    if (e.target.classList && e.target.classList.contains("todo-status")) {
      const custName = e.target.dataset.cust;
      const todoIdx = parseInt(e.target.dataset.todo, 10);
      saveTodo(custName, todoIdx, { status: e.target.value });
      return;
    }
  });

  return { load, saveKr, saveKrImmediate, saveTodo, updateCounters, wireTopbar, toast };
})();

// Boot.
(async () => {
  try {
    window.__api.wireTopbar();
    await window.__api.load();
  } catch (e) {
    console.error(e);
    window.__api.toast("startup failed: " + e.message, "err");
  }
})();

// Whenever renderContent() runs (a customer is opened/switched), fetch the
// customer's Ideal Config from the backend and paint it into the new card.
(function wireIdealConfig() {
  const origRender = window.renderContent;
  if (!origRender) return;
  window.renderContent = function () {
    const ret = origRender.apply(this, arguments);
    const cust = window.activeCust;
    if (!cust) return ret;
    const body = document.getElementById('icTableBody');
    const badge = document.getElementById('icHealthBadge');
    const source = document.getElementById('icSourceBadge');
    if (!body || !badge) return ret;

    body.innerHTML = `<tr><td colspan="4" style="padding:14px;color:var(--cp-text-muted)">loading Ideal Config…</td></tr>`;
    badge.textContent = '— loading';
    badge.className = 'ic-health ic-health-unknown';

    fetch('/api/customer/' + encodeURIComponent(cust) + '/ideal-config')
      .then(r => r.json())
      .then(d => {
        // Title pill
        const h = d.overall_health || 'unknown';
        const label = h === 'unknown'
          ? `${d.green_count}/${d.total_count} · data not yet wired`
          : `${d.green_count}/${d.total_count} healthy · ${h.toUpperCase()}`;
        badge.textContent = label;
        badge.className = 'ic-health ic-health-' + h;
        if (source) source.textContent = 'source: ' + (d.data_source || 'unknown');

        body.innerHTML = d.settings.map(s => `
          <tr data-ic-setting="${escapeHtml(s.setting_id || '')}">
            <td class="kr-name">
              ${escapeHtml(s.label)}
              <span class="wl">${escapeHtml(s.workload || '')}</span>
              <span class="crit">${escapeHtml(s.spec || '')}</span>
            </td>
            <td><span class="ic-status-pill ${s.status}">${s.status.toUpperCase()}</span></td>
            <td><span class="kr-num">${escapeHtml(s.value || '—')}</span></td>
            <td>
              <div class="notes ic-note"
                   contenteditable="true"
                   data-cust="${escapeHtml(cust)}"
                   data-ic-setting="${escapeHtml(s.setting_id || '')}"
                   data-placeholder="Add a note…">${escapeHtml(s.notes || '')}</div>
            </td>
          </tr>
        `).join('');
      })
      .catch(e => {
        body.innerHTML = `<tr><td colspan="4" style="padding:14px;color:var(--cp-danger)">Failed: ${escapeHtml(e.message || String(e))}</td></tr>`;
      });
    return ret;
  };

  // Local html-escape helper (mirrors the page's existing util)
  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, m =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
})();

// Delegated handler for the Expand toggle — works for both KR view and Heatmap view.
// The kr-expanded class drives the layout collapse in BOTH modes (via stacked
// CSS selectors `body.kr-expanded` and `body.heatmap-view.kr-expanded`).
document.addEventListener("click", (e) => {
  const btn = e.target.closest("#btnExpandKR");
  if (!btn) return;
  const content = document.querySelector(".content");
  const expanded = document.body.classList.toggle("kr-expanded");
  if (content) content.classList.toggle("kr-expanded", expanded);
  // Label refresh is handled by the heatmap module's mutation observer.
});

// ---------- Heatmap + PEC info pill ----------
(function setupHeatmapAndPecs() {
  const STATE_LABELS = {
    NOT_LICENSED: "Not Licensed", STATUS_UNKNOWN: "Status Unknown",
    NO_INTENT: "No Intent", INTENT: "Intent",
    IN_PROGRESS: "In Progress", ONBOARDED: "Onboarded",
  };
  const STATE_COLORS = {
    NOT_LICENSED: "#8a8a8a", STATUS_UNKNOWN: "#c8c8c8",
    NO_INTENT: "#b91c1c", INTENT: "#f5b800",
    IN_PROGRESS: "#ea7c1c", ONBOARDED: "#2e8540",
  };
  let currentCust = null;
  let currentHeatmap = null;

  function activeCustomerNick() {
    // The current customer is whatever block is currently rendered. The
    // app's block_index drives the URL hash on selection. Easiest source
    // of truth: the data-cust attribute on the PEC info pill we just rendered.
    const pill = document.querySelector(".pec-info-pill");
    return pill ? pill.dataset.cust : null;
  }

  // ---------- PEC popover ----------
  function buildPecPopover() {
    if (document.getElementById("pecPopover")) return;
    const back = document.createElement("div");
    back.className = "pec-popover-backdrop";
    back.id = "pecPopover";
    back.innerHTML = `
      <div class="pec-popover">
        <div class="pec-popover-hdr">
          <h4 id="pecPopHeader">PECs</h4>
          <button class="pec-close" type="button">×</button>
        </div>
        <div class="pec-tabs">
          <button class="pec-tab active" data-pec-tab="active">Active</button>
          <button class="pec-tab" data-pec-tab="closed">Closed</button>
        </div>
        <div class="pec-list" id="pecList"></div>
      </div>`;
    document.body.appendChild(back);
    back.addEventListener("click", (e) => { if (e.target === back) back.classList.remove("show"); });
    back.querySelector(".pec-close").onclick = () => back.classList.remove("show");
    back.querySelectorAll(".pec-tab").forEach((t) => {
      t.onclick = () => {
        back.querySelectorAll(".pec-tab").forEach((x) => x.classList.toggle("active", x === t));
        renderPecList(t.dataset.pecTab);
      };
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && back.classList.contains("show")) back.classList.remove("show");
    });
  }
  let lastPecData = null;
  function renderPecList(filter) {
    const list = document.getElementById("pecList");
    if (!lastPecData) { list.innerHTML = ""; return; }
    const all = lastPecData.pecs || [];
    const rows = all.filter((p) => (filter === "active"
      ? (p.state || "").toLowerCase() !== "closed"
      : (p.state || "").toLowerCase() === "closed"));
    if (rows.length === 0) {
      list.innerHTML = `<div class="pec-empty">
        No ${filter} PECs.${lastPecData.detail_source === "empty" ?
        '<div class="pec-empty-hint">Live PEC detail sync runs in MVP2. Counts on the customer header reflect the latest refresh.</div>' : ""}
      </div>`;
      return;
    }
    list.innerHTML = rows.map((p) => `
      <div class="pec-row">
        <div>
          <div class="pec-title">${p.title || p.ticket}</div>
          <div class="pec-meta">
            ${p.ticket} · ${p.workload || "—"} · owner ${p.owner || "—"}
            ${p.last_modified ? `· last touch ${p.last_modified}` : ""}
          </div>
        </div>
        <span class="pec-stage-pill">${p.stage || p.state || "—"}</span>
      </div>`).join("");
  }
  async function openPecPopover(nick) {
    buildPecPopover();
    const back = document.getElementById("pecPopover");
    document.getElementById("pecPopHeader").textContent = `PECs · ${nick}`;
    document.getElementById("pecList").innerHTML = `<div class="pec-empty">loading…</div>`;
    back.classList.add("show");
    try {
      const r = await fetch(`/api/customer/${encodeURIComponent(nick)}/pecs`);
      lastPecData = await r.json();
      document.getElementById("pecPopHeader").textContent =
        `PECs · ${nick} · ${lastPecData.summary.active} active / ${lastPecData.summary.closed} closed`;
      renderPecList("active");
    } catch (e) {
      document.getElementById("pecList").innerHTML =
        `<div class="pec-empty">Failed to load: ${e.message}</div>`;
    }
  }
  document.addEventListener("click", (e) => {
    const pill = e.target.closest(".pec-info-pill");
    if (pill) { openPecPopover(pill.dataset.cust); }
  });

  // ---------- Heatmap render ----------
  // Maps the catalog category names to the slide-faithful zone keys.
  const SLIDE_ZONES = {
    "Core Infrastructure":                 "core",
    "Productivity / Protection":           "prod",
    "Endpoint Management":                 "prod",
    "Mobile / Virtual":                    "prod",
    "Identity Access / Protection":        "ident",
    "Information Protection / Governance": "purview",
    "Copilot":                             "copilot",
    "Viva Employee Experience":            "viva",
    "Windows + Other":                     "windows",
  };
  const SLIDE_ZONE_LABELS = {
    core: "Core Infrastructure",
    prod: "Productivity · Endpoint · Mobile",
    ident: "Identity Access / Protection / Governance",
    purview: "Information Protection / Governance (Purview)",
    copilot: "Copilot",
    viva: "Viva Employee Experience",
    windows: "Windows + Other",
  };
  const STATUS_GROUP_ORDER = ["NO_INTENT", "IN_PROGRESS", "INTENT", "STATUS_UNKNOWN", "ONBOARDED", "NOT_LICENSED"];
  const STATUS_GROUP_LABELS = {
    NO_INTENT: "🔴 Blocked / No Intent",
    IN_PROGRESS: "🟠 Active Motion (deploying / pilot)",
    INTENT: "🟡 Planned (on roadmap)",
    STATUS_UNKNOWN: "⚪ Status Unknown (signal gap)",
    ONBOARDED: "🟢 In Production",
    NOT_LICENSED: "⚫ Not Licensed",
  };
  const STATUS_GROUP_ACTION = {
    NO_INTENT: "Decision point — revive or de-scope",
    IN_PROGRESS: "Keep momentum, target ONBOARDED",
    INTENT: "Schedule kickoff",
    STATUS_UNKNOWN: "Sync from FTBI to fill gaps",
    ONBOARDED: "Celebrate / consider disengage",
    NOT_LICENSED: "Upsell opportunity",
  };

  function tileHtml(t) {
    const overrideClass = t.source === "override" ? "hm-override" : t.source === "ftbi" ? "hm-ftbi" : "";
    const tipSource = t.source === "override" ? "\n(FTA override)" :
                      t.source === "ftbi"     ? "\n(auto from FTBI)" :
                      t.source === "kr"       ? "\n(auto from KR)" : "";
    return `<div class="hm-tile s-${t.state} ${overrideClass}"
                 data-tile-id="${t.id}" data-tile-name="${t.name.replace(/"/g, "&quot;")}"
                 title="${t.name}${t.kr ? " · KR: " + t.kr : ""}${t.note ? "\n" + t.note : ""}${tipSource}">
              ${t.sku ? `<span class="hm-sku sku-${t.sku}">${t.sku}</span>` : ""}
              <div class="hm-name">${t.name}</div>
              ${t.lead ? `<span class="hm-lead">${t.lead}</span>` : ""}
              <div class="hm-state">${STATE_LABELS[t.state] || t.state}</div>
            </div>`;
  }

  function renderBandsLayout(data) {
    return data.categories.map((cat) => `
      <div class="hm-cat">
        <div class="hm-cat-label">${cat.name}</div>
        <div class="hm-tiles">${cat.tiles.map(tileHtml).join("")}</div>
      </div>`).join("");
  }

  function renderSlideLayout(data) {
    // Group tiles into 7 slide zones.
    const zones = { core: [], prod: [], ident: [], purview: [], copilot: [], viva: [], windows: [] };
    data.categories.forEach((cat) => {
      const z = SLIDE_ZONES[cat.name] || "windows";
      cat.tiles.forEach((t) => zones[z].push(t));
    });
    const zoneHtml = (key) => `
      <div class="hm-slide-zone hm-zone-${key}">
        <div class="hm-slide-zone-hdr">${SLIDE_ZONE_LABELS[key]}</div>
        <div class="hm-tiles">${zones[key].map(tileHtml).join("")}</div>
      </div>`;
    return `<div class="hm-slide-grid">
      ${zoneHtml("core")}
      ${zoneHtml("prod")}
      ${zoneHtml("ident")}
      ${zoneHtml("copilot")}
      ${zoneHtml("purview")}
      ${zoneHtml("viva")}
      ${zoneHtml("windows")}
    </div>`;
  }

  function renderStatusLayout(data) {
    // Flatten all tiles + bucket by state.
    const all = [];
    data.categories.forEach((c) => c.tiles.forEach((t) => all.push(t)));
    const byState = {};
    STATUS_GROUP_ORDER.forEach((s) => { byState[s] = []; });
    all.forEach((t) => {
      if (byState[t.state]) byState[t.state].push(t);
      else byState.STATUS_UNKNOWN.push(t);
    });
    return `<div class="hm-status-grid">
      ${STATUS_GROUP_ORDER.map((s) => {
        const tiles = byState[s];
        return `<div class="hm-status-group g-${s}">
          <div class="hm-status-hdr">
            <span>${STATUS_GROUP_LABELS[s]}</span>
            <span class="hm-status-count">${tiles.length}</span>
            <span class="hm-status-action">${STATUS_GROUP_ACTION[s]}</span>
          </div>
          ${tiles.length === 0
            ? `<div class="hm-status-empty">No tiles in this state.</div>`
            : `<div class="hm-status-tiles">${tiles.map(tileHtml).join("")}</div>`}
        </div>`;
      }).join("")}
    </div>`;
  }

  function renderHeatmap(data) {
    const body = document.getElementById("heatmapBody");
    if (!body) return;
    const layout = localStorage.getItem("fta-heatmap-layout") || "slide";
    const sel = document.getElementById("hmLayout");
    if (sel) sel.value = layout;
    if (layout === "slide") body.innerHTML = renderSlideLayout(data);
    else if (layout === "status") body.innerHTML = renderStatusLayout(data);
    else body.innerHTML = renderBandsLayout(data);
    // Click handler to open editor — works for all layouts because tiles
    // share the .hm-tile class.
    body.querySelectorAll(".hm-tile").forEach((tile) => {
      tile.onclick = () => openTileEditor(tile.dataset.tileId, tile.dataset.tileName, data);
    });
  }

  // Layout dropdown change handler — re-renders with the new layout.
  document.addEventListener("change", (e) => {
    if (e.target && e.target.id === "hmLayout") {
      localStorage.setItem("fta-heatmap-layout", e.target.value);
      if (currentHeatmap) renderHeatmap(currentHeatmap);
    }
  });

  async function loadHeatmap(nick) {
    currentCust = nick;
    const card = document.getElementById("heatmapCard");
    if (!card) return;
    card.style.display = "block";
    document.body.classList.add("heatmap-view");
    document.getElementById("heatmapBody").innerHTML =
      `<div style="text-align:center;padding:30px;color:var(--cp-text-muted)">loading heatmap…</div>`;
    try {
      const r = await fetch(`/api/customer/${encodeURIComponent(nick)}/heatmap`);
      currentHeatmap = await r.json();
      renderHeatmap(currentHeatmap);
    } catch (e) {
      document.getElementById("heatmapBody").innerHTML =
        `<div style="padding:20px;color:var(--cp-danger)">Failed: ${e.message}</div>`;
    }
    updateExpandLabel();
  }

  function closeHeatmap() {
    document.body.classList.remove("heatmap-view");
    const card = document.getElementById("heatmapCard");
    if (card) card.style.display = "none";
    updateExpandLabel();
  }

  function updateExpandLabel() {
    const btn = document.getElementById("btnExpandKR");
    if (!btn) return;
    const isExpanded = document.body.classList.contains("kr-expanded");
    const isHeatmap = document.body.classList.contains("heatmap-view");
    const target = isHeatmap ? "Heatmap" : "KR view";
    btn.textContent = isExpanded ? "⛶ Collapse" : "⛶ Expand";
    btn.title = isExpanded
      ? `Collapse ${target}; show sidebar`
      : `Expand ${target}: hides sidebar`;
  }

  // ---------- Tile editor ----------
  function buildTileEditor() {
    if (document.getElementById("hmEditor")) return;
    const back = document.createElement("div");
    back.className = "hm-editor-backdrop";
    back.id = "hmEditor";
    const stateOpts = ["NOT_LICENSED","STATUS_UNKNOWN","NO_INTENT","INTENT","IN_PROGRESS","ONBOARDED"]
      .map((s) => `<option value="${s}">${STATE_LABELS[s]}</option>`).join("");
    const leadOpts = ["", "FT", "MSFT-Engaged", "Partner-Engaged", "Customer"]
      .map((l) => `<option value="${l}">${l || "(none)"}</option>`).join("");
    back.innerHTML = `
      <div class="hm-editor">
        <h4 id="hmEdName">Tile</h4>
        <div class="hm-ed-sub" id="hmEdSub"></div>
        <label>State</label>
        <select id="hmEdState">${stateOpts}</select>
        <div class="hm-ed-source" id="hmEdSource"></div>
        <label>Deployment Lead</label>
        <select id="hmEdLead">${leadOpts}</select>
        <label>Note (optional)</label>
        <textarea id="hmEdNote" placeholder="e.g. Customer blocked on works council approval; revisit Q3."></textarea>
        <div class="hm-ed-actions">
          <button class="btn secondary hm-ed-clear" id="hmEdClear">Reset to auto</button>
          <button class="btn secondary" id="hmEdCancel">Cancel</button>
          <button class="btn" id="hmEdSave">Save override</button>
        </div>
      </div>`;
    document.body.appendChild(back);
    back.addEventListener("click", (e) => { if (e.target === back) back.classList.remove("show"); });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && back.classList.contains("show")) back.classList.remove("show");
    });
  }
  let editingTileId = null;
  function openTileEditor(tileId, tileName, data) {
    buildTileEditor();
    editingTileId = tileId;
    // Find current tile state
    let cur = null;
    for (const cat of data.categories) {
      for (const t of cat.tiles) { if (t.id === tileId) { cur = t; break; } }
      if (cur) break;
    }
    if (!cur) return;
    document.getElementById("hmEdName").textContent = tileName;
    document.getElementById("hmEdSub").textContent =
      cur.kr ? `Auto-linked to KR: ${cur.kr} (${cur.kr_status || "—"})` : "No KR mapping — manual only";
    document.getElementById("hmEdState").value = cur.state;
    document.getElementById("hmEdLead").value = cur.lead || "";
    document.getElementById("hmEdNote").value = cur.note || "";
    document.getElementById("hmEdSource").textContent =
      cur.source === "override" ? "Currently: FTA override"
      : cur.source === "kr"     ? `Currently: auto from KR (${cur.kr_status || "—"})`
      :                            "Currently: no signal";
    document.getElementById("hmEditor").classList.add("show");
  }
  document.addEventListener("click", async (e) => {
    if (e.target.id === "hmEdCancel") {
      document.getElementById("hmEditor").classList.remove("show");
    } else if (e.target.id === "hmEdClear") {
      // Clear override → revert to auto
      try {
        await fetch(`/api/customer/${encodeURIComponent(currentCust)}/heatmap/${editingTileId}`,
          { method: "PATCH", headers: { "content-type": "application/json" }, body: JSON.stringify({ state: "" }) });
        document.getElementById("hmEditor").classList.remove("show");
        loadHeatmap(currentCust);
      } catch (err) { alert("Failed: " + err.message); }
    } else if (e.target.id === "hmEdSave") {
      const body = {
        state: document.getElementById("hmEdState").value,
        lead:  document.getElementById("hmEdLead").value,
        note:  document.getElementById("hmEdNote").value,
      };
      try {
        await fetch(`/api/customer/${encodeURIComponent(currentCust)}/heatmap/${editingTileId}`,
          { method: "PATCH", headers: { "content-type": "application/json" }, body: JSON.stringify(body) });
        document.getElementById("hmEditor").classList.remove("show");
        loadHeatmap(currentCust);
      } catch (err) { alert("Failed: " + err.message); }
    }
  });

  // ---------- Heatmap button toggle + close ----------
  function updateHeatmapButtonLabel() {
    const btn = document.getElementById("btnHeatmap");
    if (!btn) return;
    btn.textContent = document.body.classList.contains("heatmap-view")
      ? "Customer Workspace"
      : "M365 Usage Heatmap";
  }
  document.addEventListener("click", (e) => {
    if (e.target.id === "btnHeatmap" || e.target.closest("#btnHeatmap")) {
      const isOpen = document.body.classList.contains("heatmap-view");
      if (isOpen) {
        closeHeatmap();
      } else {
        const nick = activeCustomerNick();
        if (nick) loadHeatmap(nick);
      }
      // Defer to next tick so heatmap-view class is settled.
      setTimeout(updateHeatmapButtonLabel, 0);
    } else if (e.target.id === "btnHeatmapPng") {
      exportHeatmapPng();
    } else if (e.target.id === "btnHeatmapPptx") {
      exportHeatmapPptx();
    } else if (e.target.id === "btnHeatmapFtbiSync") {
      syncFromFtbi();
    }
  });
  // Sync label whenever heatmap-view class changes (covers programmatic
  // closes triggered by customer switch).
  new MutationObserver(updateHeatmapButtonLabel)
    .observe(document.body, { attributes: true, attributeFilter: ["class"] });

  async function syncFromFtbi() {
    if (!currentCust) return;
    // Route through shared queue-confirm modal.
    const result = await window.__queueSkill.queueSkill("heatmap-ftbi-sync", { cust: currentCust });
    if (result.ok) {
      // In demo mode the endpoint writes directly + returns synchronously,
      // so we can refresh the heatmap immediately. In stable, the skill
      // runs at next heartbeat tick — refresh anyway to clear stale state.
      setTimeout(() => loadHeatmap(currentCust), 600);
    }
  }

  async function refreshSingleCustomer(cust) {
    const c = cust || currentCust || window.activeCust;
    if (!c) return;
    const result = await window.__queueSkill.queueSkill("single-customer-refresh", { cust: c });
    if (result.ok) {
      if (typeof toast === "function") toast("refresh queued — KR + Non-KR + heatmap will reload when done", "ok");
      setTimeout(() => {
        try { if (typeof loadHeatmap === "function") loadHeatmap(c); } catch {}
        // Reload Non-KR table if it's currently visible
        const nkBody = document.getElementById(`nonkrTableBody-${c}`);
        if (nkBody && document.getElementById("nonkrTableWrap")?.style.display !== "none") {
          if (window.__nonKrReload) window.__nonKrReload(c);
        }
      }, 1500);
    }
  }
  // Expose for the customer-header button handler (lives in setupNonKr below)
  window.__refreshSingleCustomer = refreshSingleCustomer;

  // Update Expand label whenever expansion state changes.
  const _origObserver = new MutationObserver(updateExpandLabel);
  _origObserver.observe(document.body, { attributes: true, attributeFilter: ["class"] });

  // Auto-close heatmap view when user clicks to a different customer in sidebar.
  document.addEventListener("click", (e) => {
    if (e.target.closest(".sidebar .cust-row")) {
      // small delay so the click fires + customer re-renders first
      setTimeout(() => {
        if (document.body.classList.contains("heatmap-view")) closeHeatmap();
      }, 50);
    }
  });

  // ---------- Export: PNG ----------
  async function ensureLib(src, globalName) {
    if (window[globalName]) return;
    return new Promise((resolve, reject) => {
      const s = document.createElement("script"); s.src = src;
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }
  async function exportHeatmapPng() {
    try {
      await ensureLib("https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js", "html2canvas");
      const node = document.getElementById("heatmapCard");
      const canvas = await window.html2canvas(node, { scale: 2, backgroundColor: "#ffffff" });
      const a = document.createElement("a");
      a.href = canvas.toDataURL("image/png");
      a.download = `heatmap-${currentCust || "customer"}-${new Date().toISOString().slice(0,10)}.png`;
      a.click();
    } catch (e) { alert("PNG export failed: " + e.message); }
  }
  async function exportHeatmapPptx() {
    try {
      await ensureLib("https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js", "PptxGenJS");
      if (!currentHeatmap) return;
      const pres = new window.PptxGenJS();
      pres.layout = "LAYOUT_WIDE"; // 13.333 x 7.5 in
      const slide = pres.addSlide();
      slide.background = { fill: "FFFFFF" };
      slide.addText(`M365 Adoption Heatmap — ${currentHeatmap.customer.full_name}`, {
        x: 0.5, y: 0.3, w: 12, h: 0.5, fontSize: 22, bold: true, color: "0078D4",
      });
      slide.addText(`Generated ${new Date().toLocaleDateString()} · FTA Workspace`, {
        x: 0.5, y: 0.78, w: 12, h: 0.3, fontSize: 10, color: "888888",
      });
      // Render categories as rows
      const PALETTE = { NOT_LICENSED:"000000", STATUS_UNKNOWN:"E8E8E8",
                        NO_INTENT:"BFBFBF", INTENT:"FFFF00",
                        IN_PROGRESS:"00B0F0", ONBOARDED:"92D050" };
      let y = 1.15;
      const TILE_W = 1.4, TILE_H = 0.55, GAP = 0.08;
      const LABEL_W = 1.6;
      currentHeatmap.categories.forEach((cat) => {
        slide.addText(cat.name, {
          x: 0.5, y: y, w: LABEL_W, h: TILE_H, fontSize: 9, bold: true,
          align: "right", color: "555555", valign: "middle",
        });
        let x = 0.5 + LABEL_W + 0.1;
        let row = 0, col = 0;
        const cols = Math.floor((12.7 - LABEL_W - 0.1) / (TILE_W + GAP));
        cat.tiles.forEach((t) => {
          const tx = 0.5 + LABEL_W + 0.1 + col * (TILE_W + GAP);
          const ty = y + row * (TILE_H + GAP);
          slide.addShape("rect", {
            x: tx, y: ty, w: TILE_W, h: TILE_H,
            fill: { color: "FFFFFF" }, line: { color: "C8C8C8", width: 0.5 },
          });
          slide.addShape("rect", {
            x: tx, y: ty + TILE_H - 0.12, w: TILE_W, h: 0.12,
            fill: { color: PALETTE[t.state] || "C8C8C8" }, line: { color: PALETTE[t.state] || "C8C8C8" },
          });
          slide.addText(t.name, {
            x: tx + 0.05, y: ty + 0.03, w: TILE_W - 0.1, h: 0.30,
            fontSize: 7.5, bold: true, color: "222222", valign: "top",
          });
          if (t.sku) {
            slide.addText(t.sku, {
              x: tx + TILE_W - 0.45, y: ty + 0.03, w: 0.4, h: 0.16,
              fontSize: 6, bold: true, color: "555555", align: "right",
            });
          }
          slide.addText(STATE_LABELS[t.state] || t.state, {
            x: tx, y: ty + TILE_H - 0.13, w: TILE_W, h: 0.13,
            fontSize: 6, bold: true, color: "FFFFFF", align: "center", valign: "middle",
          });
          col++;
          if (col >= cols) { col = 0; row++; }
        });
        y += (row + 1) * (TILE_H + GAP) + 0.10;
      });
      pres.writeFile({ fileName: `heatmap-${currentCust || "customer"}-${new Date().toISOString().slice(0,10)}.pptx` });
    } catch (e) { alert("PPTX export failed: " + e.message); }
  }
})();

// ---------- Shared queue-confirm modal ----------
// Single source of truth for confirming that an action is about to add a
// /skill run to the Clawpilot bridge cart. Spotlight, FTBI sync, DQ
// refresh, Open PEC, and any future skill-queueing button route through
// this so the UX is consistent and the FTA always knows what's about to
// happen — including whether the underlying skill is even installed.
window.__queueSkill = (function () {
  // Registry — one entry per skill kind. Add new entries here when wiring
  // new skill-queueing buttons.
  const REGISTRY = {
    "spotlight": {
      title: "Draft a Spotlight?",
      short: "Drafts a FastTrack Initiative Spotlight from KR + ESN + Outlook/Teams signal.",
      sideEffects: [
        { kind: "read", label: "Read MIDAS, FTOP ESNs, Outlook/Teams" },
