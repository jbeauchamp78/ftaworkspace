      requires_user_confirm: 1,
      skill_path: "spotlight",
      cart_endpoint: (ctx) => `/api/customer/${encodeURIComponent(ctx.cust)}/spotlights/queue`,
      cart_body: (ctx) => ({ kr_label: ctx.kr_label || "", lowlight: !!ctx.lowlight }),
    },
    "spotlight-lowlight": {
      title: "Draft a Lowlight Spotlight?",
      short: "Drafts a Lowlight spotlight (regression / blocker story).",
      sideEffects: [
        { kind: "read", label: "Read MIDAS regression, FTOP ESN" },
        { kind: "preview", label: "Preview before any FTOP write" },
        { kind: "write", label: "FTOP write only after your approval" },
      ],
      requires_user_confirm: 1,
      skill_path: "spotlight",
      cart_endpoint: (ctx) => `/api/customer/${encodeURIComponent(ctx.cust)}/spotlights/queue`,
      cart_body: (ctx) => ({ kr_label: ctx.kr_label || "", lowlight: true }),
    },
    "heatmap-ftbi-sync": {
      title: "Sync heatmap from FTBI?",
      short: "Pulls Power BI tenant-profile and auto-lights ~40 heatmap tiles.",
      sideEffects: [
        { kind: "read", label: "Read-only on Power BI / FTBI" },
        { kind: "write", label: "Writes only to local heatmap_overrides" },
        { kind: "preserve", label: "Manual overrides are preserved" },
      ],
      requires_user_confirm: 0,
      skill_path: "heatmap-ftbi-sync",
      cart_endpoint: (ctx) => `/api/customer/${encodeURIComponent(ctx.cust)}/heatmap/ftbi-sync`,
      cart_body: () => ({ demo: /[?&]demo=1\b/.test(location.search) }),
    },
    "dq-refresh": {
      title: "Run Data Quality refresh?",
      short: "Re-counts ESN aging + L1 Status Unknown rows and queues fixes.",
      sideEffects: [
        { kind: "read", label: "Read FTOP DQ counters" },
        { kind: "preview", label: "Sub-skills queued with their own preview gates" },
      ],
      requires_user_confirm: 1,
      skill_path: "dq-refresh",
      cart_endpoint: () => "/api/clawpilot/queue",
      cart_body: () => ({
        kind: "dq-refresh", label: "Data Quality refresh",
        prompt: "/dq-refresh", requires_user_confirm: 1,
      }),
    },
    "manage-pecs-create": {
      title: "Create a new PEC?",
      short: "Opens a new FTOP PEC (Prioritized Engagement Case) for a workload.",
      sideEffects: [
        { kind: "read", label: "Read FTOP account roster" },
        { kind: "preview", label: "Skill previews PEC fields before write" },
        { kind: "write", label: "Creates a new FTOP incident on your approval" },
      ],
      requires_user_confirm: 1,
      skill_path: "manage-pecs",
      cart_endpoint: () => "/api/clawpilot/queue",
      cart_body: (ctx) => ({
        kind: "open-pec", cust: ctx.cust,
        label: `Open PEC - ${ctx.cust}${ctx.kr_label ? " - " + ctx.kr_label : ""}`,
        prompt: ctx.kr_label
          ? `/manage-pecs create ${ctx.cust} for KR "${ctx.kr_label}"`
          : `/manage-pecs create ${ctx.cust}`,
        requires_user_confirm: 1,
      }),
    },
    "single-customer-refresh": {
      title: "Refresh this customer?",
      short: "Pulls fresh MIDAS data for ALL workloads (KR + Non-KR), FTOP PECs, and Lynx admin config — scoped to one customer.",
      sideEffects: [
        { kind: "read", label: "Read MIDAS (KR + 49 Non-KR workloads), FTOP PECs, Lynx admin config" },
        { kind: "write", label: "Writes KR status, Non-KR MAU/MoM, heatmap auto-state, PEC counts to local DB only" },
        { kind: "preserve", label: "Manual overrides + Non-KR status/notes preserved" },
      ],
      requires_user_confirm: 0,
      skill_path: "fta-workspace",
      cart_endpoint: (ctx) => `/api/customer/${encodeURIComponent(ctx.cust)}/refresh`,
      cart_body: () => ({}),
    },
  };

  const SE_ICONS = { read: "👁", preview: "📋", write: "✏", preserve: "🛡" };
  const SE_COLORS = { read: "#0078d4", preview: "#d99c1f", write: "#b91c1c", preserve: "#2e8540" };

  let cachedInstalled = null;
  async function ensureInstalled() {
    if (cachedInstalled) return cachedInstalled;
    try {
      const r = await fetch("/api/skills/installed");
      const data = await r.json();
      cachedInstalled = data.installed || [];
    } catch { cachedInstalled = []; }
    return cachedInstalled;
  }

  function buildModal() {
    if (document.getElementById("qsModal")) return;
    const back = document.createElement("div");
    back.className = "sp-confirm";  // reuse spotlight confirm overlay styles
    back.id = "qsModal";
    back.innerHTML = `
      <div class="sp-confirm-body" style="max-width:520px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
          <h4 id="qsTitle" style="margin:0;flex:1;">Queue Clawpilot skill?</h4>
          <span id="qsSkillBadge" style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;border:1px solid;"></span>
        </div>
        <p id="qsShort"></p>
        <div style="margin:10px 0 6px;font-size:11px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:var(--cp-text-muted);">Prompt</div>
        <div style="background:var(--cp-surface-soft);border:1px solid var(--cp-border);border-radius:6px;padding:8px 10px;font-family:Consolas,monospace;font-size:12px;color:var(--cp-accent);overflow-x:auto;" id="qsPrompt"></div>
        <div style="margin:12px 0 6px;font-size:11px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:var(--cp-text-muted);">Side effects</div>
        <div id="qsSE" style="display:flex;flex-direction:column;gap:4px;font-size:12.5px;"></div>
        <label style="display:flex;align-items:center;gap:6px;margin-top:14px;font-size:11.5px;color:var(--cp-text-muted);cursor:pointer;">
          <input type="checkbox" id="qsDontAsk" style="margin:0;"> Don't ask again for this skill
        </label>
        <div class="sp-confirm-actions">
          <button class="btn secondary" id="qsCancel">Cancel</button>
          <button class="btn" id="qsOk">Queue ⚡</button>
        </div>
      </div>`;
    document.body.appendChild(back);
    back.addEventListener("click", (e) => { if (e.target === back) back.classList.remove("show"); });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && back.classList.contains("show")) back.classList.remove("show");
    });
  }

  function previewPrompt(reg, ctx) {
    // Reuse the cart_body to extract a human-readable prompt for display.
    const body = reg.cart_body ? reg.cart_body(ctx) : {};
    if (body && body.prompt) return body.prompt;
    if (reg === REGISTRY.spotlight || reg === REGISTRY["spotlight-lowlight"]) {
      const flags = []; if (body.lowlight) flags.push("--lowlight");
      let p = `/spotlight ${ctx.cust}`;
      if (flags.length) p += " " + flags.join(" ");
      if (body.kr_label) p += `  # context: KR=${body.kr_label}`;
      return p;
    }
    if (reg === REGISTRY["heatmap-ftbi-sync"]) {
      return `/heatmap-ftbi-sync ${ctx.cust}`;
    }
    return `(skill: ${reg.skill_path})`;
  }

  // Public: queueSkill(kind, ctx, opts) → Promise<{ok, queue_id?}>
  async function queueSkill(kind, ctx = {}, opts = {}) {
    const reg = REGISTRY[kind];
    if (!reg) {
      console.warn("queueSkill: unknown kind", kind);
      return { ok: false, error: "unknown skill kind" };
    }
    const skipKey = `fta-workspace-skip-confirm-${kind}`;
    const skipSaved = !opts.force && localStorage.getItem(skipKey) === "1";

    const installed = await ensureInstalled();
    const isInstalled = installed.includes(reg.skill_path);

    // Fast path: skip confirm
    if (skipSaved && isInstalled) {
      return doQueue(reg, ctx);
    }

    buildModal();
    const back = document.getElementById("qsModal");
    document.getElementById("qsTitle").textContent = reg.title;
    document.getElementById("qsShort").textContent = reg.short;
    document.getElementById("qsPrompt").textContent = previewPrompt(reg, ctx);
    // Skill installed badge
    const badge = document.getElementById("qsSkillBadge");
    if (isInstalled) {
      badge.textContent = `✓ /${reg.skill_path} installed`;
      badge.style.background = "rgba(46,133,64,0.12)";
      badge.style.color = "#1f5f2c"; badge.style.borderColor = "#2e8540";
    } else {
      badge.textContent = `⚠ /${reg.skill_path} not found`;
      badge.style.background = "rgba(185,28,28,0.10)";
      badge.style.color = "#7a0000"; badge.style.borderColor = "#b91c1c";
    }
    // Side effects
    const se = document.getElementById("qsSE");
    se.innerHTML = (reg.sideEffects || []).map((s) =>
      `<div style="display:flex;align-items:center;gap:8px;">
         <span style="font-size:14px;color:${SE_COLORS[s.kind]||'#666'};">${SE_ICONS[s.kind]||'•'}</span>
         <span>${s.label}</span>
       </div>`
    ).join("");
    // Don't ask again
    const dontAsk = document.getElementById("qsDontAsk");
    dontAsk.checked = false;

    back.classList.add("show");

    return new Promise((resolve) => {
      const cancel = () => { back.classList.remove("show"); resolve({ ok: false, cancelled: true }); };
      const ok = async () => {
        back.classList.remove("show");
        if (dontAsk.checked) localStorage.setItem(skipKey, "1");
        const result = await doQueue(reg, ctx);
        resolve(result);
      };
      document.getElementById("qsCancel").onclick = cancel;
      document.getElementById("qsOk").onclick = ok;
    });
  }

  async function doQueue(reg, ctx) {
    try {
      const endpoint = reg.cart_endpoint(ctx);
      const body = reg.cart_body(ctx);
      const r = await fetch(endpoint, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      if (window.__api && window.__api.toast) {
        const id = data.queue_id || data.id || "?";
        window.__api.toast(`⚡ Queued · ${reg.title.replace(/\?$/, "")} (id ${id})`, "ok");
      }
      if (typeof refreshCartBadge === "function") refreshCartBadge();
      return { ok: true, queue_id: data.queue_id || data.id, data };
    } catch (e) {
      if (window.__api && window.__api.toast) {
        window.__api.toast(`Queue failed: ${e.message}`, "err");
      }
      return { ok: false, error: e.message };
    }
  }

  return { queueSkill, REGISTRY, ensureInstalled };
})();

// ---------- Spotlights: per-KR icon + customer chip + popover + queue ----------
(function setupSpotlights() {
  const ICONS = {
    RECOMMENDED:          { glyph: "✨", cls: "sp-recommended",     title: "Spotlight recommended — click to draft" },
    RECOMMENDED_LOWLIGHT: { glyph: "⚠",  cls: "sp-recommended-low", title: "Lowlight spotlight nudge — click to draft" },
    IN_FLIGHT:            { glyph: "⏳", cls: "sp-in-flight",       title: "Spotlight in flight (draft / queued)" },
    EXISTS:               { glyph: "★",  cls: "sp-exists",          title: "Published spotlight exists — click to open" },
    NONE:                 null,
  };

  const stateCache = {};  // {nickname: {by_kr, spotlights, counts}}

  async function fetchState(nick) {
    try {
      const r = await fetch(`/api/customer/${encodeURIComponent(nick)}/spotlights`);
      if (!r.ok) return null;
      const data = await r.json();
      stateCache[nick] = data;
      return data;
    } catch { return null; }
  }

  async function hydrate(nick) {
    if (!nick) return;
    const data = await fetchState(nick);
    if (!data) return;
    // Per-KR icons
    document.querySelectorAll(`.kr-sp-icon[data-cust="${CSS.escape(nick)}"]`).forEach((el) => {
      const krLabel = el.dataset.krLabel;
      const st = (data.by_kr && data.by_kr[krLabel]) || { state: "NONE" };
      const ic = ICONS[st.state];
      el.className = "kr-sp-icon"; el.removeAttribute("title"); el.textContent = "";
      el.onclick = null;
      if (!ic) return;
      el.classList.add(ic.cls);
      el.textContent = ic.glyph;
      el.title = ic.title + (st.title ? "\n" + st.title : "");
      el.onclick = (e) => {
        e.stopPropagation();
        if (st.state === "EXISTS" && st.url) {
          window.open(st.url, "_blank");
        } else if (st.state === "IN_FLIGHT") {
          // Open cart panel
          const cartBtn = document.getElementById("btnCart") || document.querySelector(".cart-pill");
          if (cartBtn) cartBtn.click();
        } else {
          confirmAndQueue(nick, krLabel, st.state === "RECOMMENDED_LOWLIGHT");
        }
      };
    });
    // Customer header chip
    const chip = document.getElementById(`cust-sp-chip-${nick.replace(/[^a-z0-9]/gi,'_')}`);
    if (chip) {
      const n = data.published_count || 0;
      const total = data.total_spotlights || 0;
      chip.querySelector(".sp-count").textContent = n;
      chip.classList.toggle("csl-zero", n === 0);
      chip.title = `✨ ${n} published${total > n ? ` · ${total - n} in draft/review` : ""} (click for details)`;
      chip.onclick = () => openPopover(nick, data);
    }
  }

  // ---------- Popover (lists all spotlights for a customer) ----------
  function buildPopover() {
    if (document.getElementById("spPopover")) return;
    const back = document.createElement("div");
    back.className = "sp-popover-backdrop"; back.id = "spPopover";
    back.innerHTML = `
      <div class="sp-popover">
        <div class="sp-popover-hdr">
          <h4 id="spPopHeader">Spotlights</h4>
          <button class="sp-close" type="button">×</button>
        </div>
        <div class="sp-list" id="spList"></div>
      </div>`;
    document.body.appendChild(back);
    back.addEventListener("click", (e) => { if (e.target === back) back.classList.remove("show"); });
    back.querySelector(".sp-close").onclick = () => back.classList.remove("show");
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && back.classList.contains("show")) back.classList.remove("show");
    });
  }

  function openPopover(nick, data) {
    buildPopover();
    const back = document.getElementById("spPopover");
    document.getElementById("spPopHeader").textContent =
      `Spotlights · ${nick} · ${data.published_count} published · ${data.total_spotlights} total`;
    const list = document.getElementById("spList");
    if (!data.spotlights || data.spotlights.length === 0) {
      list.innerHTML = `<div class="sp-empty">No spotlights yet for this customer.<br>
        <span style="font-size:11.5px">Click ✨ next to any KPI WIN row to draft one.</span></div>`;
    } else {
      list.innerHTML = data.spotlights.map((s) => `
        <div class="sp-row">
          <div>
            <div class="sp-title">${s.title || "Untitled spotlight"}</div>
            <div class="sp-meta">
              ${s.kr_label ? `KR: ${s.kr_label} · ` : ""}
              ${s.kind === "lowlight" ? "Lowlight · " : ""}
              ${s.created_on ? `created ${s.created_on}` : ""}
              ${s.url ? `· <a href="${s.url}" target="_blank">open in FTOP</a>` : ""}
            </div>
          </div>
          <span class="sp-stage-pill ${(s.stage || "").toLowerCase()}">${s.stage || "—"}</span>
        </div>`).join("");
    }
    back.classList.add("show");
  }

  // ---------- Queue confirm dialog ----------
  function buildConfirm() {
    if (document.getElementById("spConfirm")) return;
    const back = document.createElement("div");
    back.className = "sp-confirm"; back.id = "spConfirm";
    back.innerHTML = `
      <div class="sp-confirm-body">
        <h4 id="spConfirmTitle">Draft a Spotlight?</h4>
        <p id="spConfirmDesc"></p>
        <div class="sp-confirm-actions">
          <button class="btn secondary" id="spConfirmCancel">Cancel</button>
          <button class="btn" id="spConfirmOk">Queue ✨</button>
        </div>
      </div>`;
    document.body.appendChild(back);
    back.addEventListener("click", (e) => { if (e.target === back) back.classList.remove("show"); });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && back.classList.contains("show")) back.classList.remove("show");
    });
  }

  async function confirmAndQueue(nick, krLabel, isLowlight) {
    // Route through shared queue-confirm modal (window.__queueSkill).
    const kind = isLowlight ? "spotlight-lowlight" : "spotlight";
    const result = await window.__queueSkill.queueSkill(kind, {
      cust: nick, kr_label: krLabel,
    });
    if (result.ok) {
      // Refresh per-cust spotlight state so the icon flips ⏳
      hydrate(nick);
    }
  }

  // ---------- Hydrate on customer switch or row re-render ----------
  // The KR table re-renders whenever the active customer changes OR whenever
  // a single row mutates (e.g., status change PATCH triggers a re-fetch +
  // re-paint). We watch for kr-sp-icon nodes that are EMPTY (just-rendered)
  // and trigger hydration. Debounced so a burst of mutations only fires once.
  function _activeNick() {
    const icon = document.querySelector(".kr-sp-icon");
    return icon ? icon.dataset.cust : null;
  }
  let _lastNick = null;
  let _hydrateTimer = null;
  function _scheduleHydrate() {
    if (_hydrateTimer) return;
    _hydrateTimer = setTimeout(() => {
      _hydrateTimer = null;
      const nick = _activeNick();
      if (!nick) return;
      const icons = document.querySelectorAll(`.kr-sp-icon[data-cust="${CSS.escape(nick)}"]`);
      if (icons.length === 0) return;
      // If any icon is empty (no glyph rendered yet) OR nick changed, hydrate.
      const anyEmpty = Array.from(icons).some(el => el.textContent === "");
      if (nick !== _lastNick || anyEmpty) {
        _lastNick = nick;
        hydrate(nick);
      }
    }, 80);
  }
  const obs = new MutationObserver(_scheduleHydrate);
  obs.observe(document.body, { childList: true, subtree: true });
  // First hydration after page load
  setTimeout(_scheduleHydrate, 1200);

  // Expose for other modules
  window.__spotlights = { hydrate, fetchState, openPopover };
})();

// ---------- Definitions epoch pills + modal ----------
(function setupDefinitions() {
  let cached = null;

  function fmtDate(iso) {
    if (!iso) return "—";
    try {
      const d = new Date(iso + "T00:00:00");
      return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    } catch { return iso; }
  }

  function buildModal() {
    if (document.getElementById("defModal")) return;
    const back = document.createElement("div");
    back.className = "def-modal-backdrop";
    back.id = "defModal";
    back.innerHTML = `
      <div class="def-modal" role="dialog" aria-modal="true" aria-labelledby="defModalTitle">
        <div class="def-modal-head">
          <h3 id="defModalTitle">Definitions</h3>
          <span class="def-badge" id="defModalEpoch">—</span>
          <button class="def-close" type="button" aria-label="Close">×</button>
        </div>
        <div class="def-modal-body" id="defModalBody"></div>
      </div>`;
    document.body.appendChild(back);
    back.addEventListener("click", (e) => { if (e.target === back) back.classList.remove("show"); });
    back.querySelector(".def-close").addEventListener("click", () => back.classList.remove("show"));
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && back.classList.contains("show")) back.classList.remove("show");
    });
  }

  function renderModal(kind) {
    if (!cached) return;
    buildModal();
    const back = document.getElementById("defModal");
    const title = document.getElementById("defModalTitle");
    const epoch = document.getElementById("defModalEpoch");
    const body = document.getElementById("defModalBody");
    const data = kind === "kr" ? cached.kr : cached.ideal_config;
    const headerTitle = kind === "kr" ? "KR Rules" : "Copilot Ideal Config Rules";
    title.textContent = headerTitle;
    epoch.textContent = data.epoch;

    const scopeRows = (data.scope || []).map(s =>
      `<li><span class="def-name">${s.name}</span><span class="def-rule">${s.rule || s.desc || ""}</span></li>`
    ).join("");

    const notesHtml = (data.notes && data.notes.length)
      ? `<div class="def-section-title">Evaluation Notes</div>
         <ul class="def-notes">${data.notes.map(n => `<li>${n}</li>`).join("")}</ul>`
      : "";

    const cl = (cached.changelog || []).filter(c =>
      kind === "kr" ? c.kind === "kr" : c.kind === "config"
    );
    const clHtml = cl.length
      ? `<div class="def-section-title">Changelog</div>
         <div class="def-changelog">${cl.map(c =>
           `<div class="def-cl-row"><div class="def-cl-date">${c.epoch} · ${fmtDate(c.date)}</div>
            <div class="def-cl-summary">${c.summary}</div></div>`
         ).join("")}</div>`
      : "";

    body.innerHTML = `
      <div class="def-sub">Effective ${fmtDate(data.effective)} · ${data.scope.length} rule${data.scope.length===1?"":"s"} in scope</div>
      <div class="def-section-title">In Scope</div>
      <ul>${scopeRows}</ul>
      ${notesHtml}
      ${clHtml}`;
    back.classList.add("show");
  }

  async function loadDefinitions() {
    try {
      const r = await fetch("/api/definitions");
      cached = await r.json();
      const k = document.getElementById("krEpoch");
      const c = document.getElementById("cfgEpoch");
      if (k && cached.kr) k.textContent = cached.kr.epoch;
      if (c && cached.ideal_config) c.textContent = cached.ideal_config.epoch;
    } catch (e) { console.warn("definitions load failed", e); }
  }

  document.querySelectorAll(".def-pill").forEach(p => {
    p.addEventListener("click", () => renderModal(p.dataset.def));
  });

  loadDefinitions();
})();

// ---------- Non-KR table — toggle slider + fetch + edit ----------
// Wires up the [Key Results | Non-KR] toggle in the Workloads card header.
// When Non-KR is selected, hides the KR table, shows the Non-KR table, and
// fetches `/api/customer/{nick}/non-krs`. Status + notes persist via
// PATCH /api/customer/{nick}/non-krs/{workload}. The ⟳ Refresh Non-KR
// button POSTs /non-krs/refresh which pulls MIDAS MAU+MoM for the 49
// Non-KR workloads scoped to this customer.
(function setupNonKr() {
  const NONKR_CLASSES = {
    "NOT STARTED": "not-started",
    "IN PROGRESS": "in-progress",
    "ONBOARDED":   "onboarded",
    "DEFERRED":    "deferred",
  };
  const NONKR_OPTIONS = ["NOT STARTED", "IN PROGRESS", "ONBOARDED", "DEFERRED"];
  function statusClass(s) { return NONKR_CLASSES[s] || "not-started"; }

  function fmtMoM(p) {
    if (p == null || isNaN(p)) return "—";
    const sign = p > 0 ? "+" : "";
    return `${sign}${Math.round(p * 10) / 10}%`;
  }
  function fmtMau(v) {
    if (v == null || isNaN(v)) return "—";
    const n = Math.round(Number(v));
    if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1) + "k";
    return String(n);
  }
  function fmtFetched(iso) {
    if (!iso) return "Not yet pulled from MIDAS";
    try {
      const d = new Date(iso);
      const today = new Date();
      const sameDay = d.toDateString() === today.toDateString();
      const t = d.toLocaleTimeString([], {hour:"numeric", minute:"2-digit"});
      return sameDay ? `MIDAS refreshed today at ${t}`
        : `MIDAS refreshed ${d.toLocaleDateString([], {month:"short", day:"numeric"})} at ${t}`;
    } catch { return iso; }
  }

  // Cache per-customer last-fetched-at so the header timestamp can render
  // synchronously when re-opening Non-KR mode.
  window.__nonKrFetchedAt = function (cust) {
    const cached = (window.__nonKrCache || {})[cust];
    return cached ? fmtFetched(cached) : "";
  };

  async function loadAndRender(cust) {
    const body = document.getElementById(`nonkrTableBody-${cust}`);
    if (!body) return;
    try {
      const r = await fetch(`/api/customer/${encodeURIComponent(cust)}/non-krs`);
      const data = await r.json();
      // Track the most recent fetched_at across all rows for the header
      let maxFetched = null;
      const rows = (data.workloads || []).map(w => {
        if (w.fetched_at && (!maxFetched || w.fetched_at > maxFetched)) maxFetched = w.fetched_at;
        const sc = statusClass(w.status);
        const opts = NONKR_OPTIONS.map(o =>
          `<option value="${o}"${o === w.status ? ' selected' : ''}>${o}</option>`
        ).join("");
        const noteHtml = `<input type="text" class="nonkr-notes-input"
            data-cust="${cust}" data-wl="${w.workload}" data-field="notes"
            value="${(w.notes || '').replace(/"/g, '&quot;')}"
            placeholder="Add a note…" />`;
        return `<tr>
          <td class="workload">${w.workload}</td>
          <td><select class="nonkr-status ${sc}"
                      data-cust="${cust}" data-wl="${w.workload}" data-field="status">
                ${opts}
              </select></td>
          <td class="mom">${fmtMau(w.current_mau)}</td>
          <td class="mom">${fmtMoM(w.mom_pct)}</td>
          <td class="pec"><button type="button" class="nonkr-pec-btn"
                      data-cust="${cust}" data-wl="${w.workload}"
                      title="Open a new PEC for this workload">+ PEC</button></td>
          <td>${noteHtml}</td>
        </tr>`;
      }).join("");
      body.innerHTML = rows || `<tr><td colspan="6" style="text-align:center;padding:14px;color:var(--cp-text-muted)">No Non-KR workloads configured.</td></tr>`;
      // Update header timestamp
      window.__nonKrCache = window.__nonKrCache || {};
      window.__nonKrCache[cust] = maxFetched;
      // Find the header span (above the table) and update its text
      const wrap = document.getElementById("nonkrTableWrap");
      if (wrap) {
        const stamp = wrap.querySelector("span");
        if (stamp) stamp.textContent = fmtFetched(maxFetched);
      }
    } catch (e) {
      body.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:14px;color:#c0392b">Failed to load: ${e.message}</td></tr>`;
    }
  }

  function setMode(mode) {
    const krWrap = document.getElementById("krTableWrap");
    const nkWrap = document.getElementById("nonkrTableWrap");
    const toggle = document.getElementById("krModeToggle");
    if (!krWrap || !nkWrap || !toggle) return;
    if (mode === "nonkr") {
      krWrap.style.display = "none";
      nkWrap.style.display = "";
      const cust = window.activeCust;
      if (cust) loadAndRender(cust);
    } else {
      krWrap.style.display = "";
      nkWrap.style.display = "none";
    }
    toggle.querySelectorAll("button").forEach(b => {
      const active = b.dataset.mode === mode;
      b.classList.toggle("active", active);
      b.setAttribute("aria-selected", active ? "true" : "false");
    });
    try { localStorage.setItem("fta-workspace-kr-mode", mode); } catch {}
  }

  async function refreshNonKrFromMidas(cust, btn) {
    if (!cust) return;
    const orig = btn ? btn.textContent : null;
    if (btn) { btn.disabled = true; btn.textContent = "🔄 refreshing…"; }
    try {
      const r = await fetch(`/api/customer/${encodeURIComponent(cust)}/non-krs/refresh`,
                            { method: "POST" });
      const data = await r.json();
      if (!data.ok) {
        if (typeof toast === "function") toast(`Non-KR refresh failed: ${data.error || 'unknown'}`, "warn");
      } else {
        if (typeof toast === "function") toast(`Non-KR refreshed: ${data.workloads_updated} workloads`, "ok");
      }
      await loadAndRender(cust);
    } catch (e) {
      if (typeof toast === "function") toast(`Non-KR refresh error: ${e.message}`, "warn");
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = orig || "🔄 Refresh This Customer"; }
    }
  }
  // Expose for the header refreshSingleCustomer hook so it can reload after a
  // single-customer refresh fires.
  window.__nonKrReload = loadAndRender;

  // Delegated handler — toggle pills + + PEC + header refresh button
  document.addEventListener("click", (e) => {
    const btn = e.target.closest("#krModeToggle button");
    if (btn && btn.dataset.mode) {
      e.preventDefault();
      setMode(btn.dataset.mode);
      return;
    }
    const pecBtn = e.target.closest(".nonkr-pec-btn");
    if (pecBtn) {
      const cust = pecBtn.dataset.cust;
      const wl = pecBtn.dataset.wl;
      if (window.__queueSkill && cust) {
        window.__queueSkill.queueSkill("manage-pecs-create", { cust, kr_label: wl });
      }
      return;
    }
    // Customer-header "🔄 Refresh This Customer" button — pulls KR + Non-KR
    // + heatmap fresh via the queue-confirm flow.
    const headerRefresh = e.target.closest("#btnRefreshCustomer");
    if (headerRefresh) {
      const cust = headerRefresh.dataset.cust || window.activeCust;
      if (window.__refreshSingleCustomer) window.__refreshSingleCustomer(cust);
    }
  });

  // Status / notes change
  document.addEventListener("change", async (e) => {
    if (e.target.classList && e.target.classList.contains("nonkr-status")) {
      const sel = e.target;
      sel.className = "nonkr-status " + statusClass(sel.value);
      try {
        await fetch(`/api/customer/${encodeURIComponent(sel.dataset.cust)}/non-krs/${encodeURIComponent(sel.dataset.wl)}`,
          { method: "PATCH", headers: {"content-type":"application/json"},
            body: JSON.stringify({ status: sel.value }) });
      } catch (err) { console.warn("non-kr status save failed", err); }
    }
  });
  document.addEventListener("blur", async (e) => {
    if (e.target.classList && e.target.classList.contains("nonkr-notes-input")) {
      const inp = e.target;
      try {
        await fetch(`/api/customer/${encodeURIComponent(inp.dataset.cust)}/non-krs/${encodeURIComponent(inp.dataset.wl)}`,
          { method: "PATCH", headers: {"content-type":"application/json"},
            body: JSON.stringify({ notes: inp.value }) });
      } catch (err) { console.warn("non-kr notes save failed", err); }
    }
  }, true);

  // On every renderContent (customer switch / re-render), if last mode was
  // "nonkr", restore that selection. Default: KR mode. Guard against
  // re-fire on the SAME customer (the observer also fires when we ourselves
  // mutate the table, which would otherwise create a feedback loop that
  // destroys <select> elements as the user clicks them).
  let _lastModeAppliedFor = null;
  const obs = new MutationObserver(() => {
    if (!document.getElementById("krModeToggle")) return;
    const currentCust = window.activeCust;
    if (currentCust === _lastModeAppliedFor) return;  // skip subtree noise
    _lastModeAppliedFor = currentCust;
    let saved = "kr";
    try { saved = localStorage.getItem("fta-workspace-kr-mode") || "kr"; } catch {}
    if (saved === "nonkr") setMode("nonkr");
  });
  const watchTarget = document.querySelector(".content") || document.body;
  obs.observe(watchTarget, { childList: true, subtree: true });
})();

      refresh: `
        <h4>Refresh & Data Sources</h4>
        <h5>What "Refresh Now" does</h5>
        <ol>
          <li><strong>Health check</strong> — Verifies backend + schema (1s).</li>
          <li><strong>Pulls MIDAS</strong> via msx-mcp / midas-mcp — latest published snapshot for every customer × OKR workload.</li>
          <li><strong>Pulls FTOP</strong> via ftop-mcp — your active PECs, recent ESNs, account assignments, DQ counts.</li>
          <li><strong>Pulls Lynx</strong> via Playwright — the 10 Copilot Ideal Config settings per tenant.</li>
          <li><strong>Re-evaluates</strong> every KR row using FY26 H2 rules (epoch shown in the pill).</li>
          <li><strong>Auto-queues</strong> safe maintenance skills (L1 cleanup, DQ refresh) when their triggers fire.</li>
          <li><strong>Pre-warms</strong> Recommended Actions per customer.</li>
        </ol>
        <h5>Automatic refreshes</h5>
        <ul>
          <li><strong>Daily 6 AM weekdays</strong> — Clawpilot automation "FTA Workspace daily refresh" runs the full pipeline + posts a Teams summary.</li>
          <li><strong>Every 30 min</strong> — Cart processor automation drains any auto-safe pending items.</li>
          <li><strong>Once per page-day</strong> — Background check refreshes the MIDAS snapshot date so the topbar doesn't go stale on a long-running tab.</li>
        </ul>
        <h5>MIDAS snapshot dates explained</h5>
        <p>MIDAS labels each monthly snapshot with that month's end-of-month date. On June 18, the latest snapshot is labeled <code>2026-06-30</code> — the data is the running June bucket, accumulating through end of month. The topbar renders this as <strong>"June 2026 (in progress)"</strong> until July 1 when it switches to <strong>"June 30 2026"</strong>.</p>
        <div class="help-callout warn"><strong>If Refresh fails with "Edge / MIDAS / FTOP / 502"</strong> — your Edge instance must be running with <code>--remote-debugging-port=9222</code> and signed in to fasttrack365 + msit.powerbi.com. The skills that scrape these portals piggyback on your authenticated browser session.</div>`,

      cart: `
        <h4>Clawpilot Bridge (the 🛒 cart)</h4>
        <p>The cart is how this UI tells <strong>Clawpilot</strong> (the desktop AI assistant) to run a skill on your behalf — without disrupting whatever you're doing in chat.</p>
        <h5>How an item flows</h5>
        <ol>
          <li><strong>Queued</strong> — Auto-maintenance or you queues an item. It lands in the cart with <span class="pill">▶ needs you</span> if it's a skill that has a preview-confirm gate (most of them).</li>
          <li><strong>Approve</strong> — Click ✓ Approve on a needs-you item to flip <code>requires_user_confirm</code> to 0. Heartbeat picks it up next tick.</li>
          <li><strong>Heartbeat</strong> — Every 30 min the "FTA Workspace cart processor" Clawpilot automation drains the cart: <code>/start</code> → run the skill → <code>/complete</code>.</li>
          <li><strong>Completed Today</strong> — Successes + non-user-confirm failures show in the panel until midnight.</li>
        </ol>
        <h5>Manual escape hatch</h5>
        <p>Each item has a <strong>Copy prompts</strong> button — copies the prompt + cart ID. Paste into Clawpilot chat and run it yourself if you'd rather not wait for the next heartbeat.</p>
        <h5>What gets auto-queued</h5>
        <ul>
          <li><strong>l1-cleanup</strong> — Triggered when L1 Status Unknown rows exist in FTOP.</li>
          <li><strong>dq-refresh</strong> — Triggered when ESN aging / DQ blockers exist.</li>

        <p><strong>Note:</strong> roster-bind is no longer auto-queued (4 portfolio accounts have permanently-NULL TPIDs in FTOP — the skill can't help them). When those FTOP records get fixed upstream, auto-queue returns.</p>
        <div class="help-callout"><strong>Why heartbeat instead of instant?</strong> Clawpilot runs in a separate process. The 30-min cadence prevents your IDE from being interrupted and gives you a window to ✓ Approve in batches.</div>`,

          <div style="flex:1">
            <h3 id="helpModalTitle">FTA Workspace · Field Guide</h3>
            <div class="help-sub">Everything you need to know — pick a section</div>
          </div>
          <label class="help-skip-toggle" style="display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,0.92);margin-right:10px;cursor:pointer;user-select:none;white-space:nowrap;">
            <input type="checkbox" id="helpSkipOnStart" style="margin:0;cursor:pointer;" />
            Don't show on startup
          </label>
          <button class="def-close" type="button" aria-label="Close">×</button>
        </div>
        <div class="help-modal-body">
          <div class="help-nav">${navHtml}</div>
          <div class="help-content">${sectionsHtml}</div>
        </div>
      </div>`;
    document.body.appendChild(back);
    back.addEventListener("click", (e) => { if (e.target === back) back.classList.remove("show"); });
    back.querySelector(".def-close").addEventListener("click", () => back.classList.remove("show"));
    // Don't-show-on-startup checkbox: writes/clears the skip key.
    const SKIP_KEY = "fta-workspace-field-guide-skip-on-start";
    const skipCb = back.querySelector("#helpSkipOnStart");
    if (skipCb) {
      skipCb.checked = localStorage.getItem(SKIP_KEY) === "1";
      skipCb.addEventListener("change", () => {
        if (skipCb.checked) localStorage.setItem(SKIP_KEY, "1");
        else localStorage.removeItem(SKIP_KEY);
      });
    }
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && back.classList.contains("show")) back.classList.remove("show");
    });
    back.querySelectorAll(".help-nav button").forEach((btn) => {
      btn.addEventListener("click", () => {
        const id = btn.dataset.helpSection;
        back.querySelectorAll(".help-nav button").forEach((b) => b.classList.toggle("active", b === btn));
        back.querySelectorAll(".help-content section").forEach((s) =>
          s.classList.toggle("active", s.id === `help-sec-${id}`)
        );
        back.querySelector(".help-content").scrollTop = 0;
      });
    });
  }

  const pill = document.getElementById("infoPill");
  if (pill) pill.addEventListener("click", () => {
    buildModal();
    document.getElementById("helpModal").classList.add("show");
  });

  // First-launch auto-open: by default, the Field Guide opens on EVERY
  // launch so users always have it in front of them. The user can opt
  // out via the "Don't show on startup" checkbox inside the modal, which
  // sets the SKIP_KEY in localStorage. Unchecking the box restores the
  // default always-show behavior.
  const SKIP_KEY = "fta-workspace-field-guide-skip-on-start";
  if (localStorage.getItem(SKIP_KEY) !== "1") {
    // Wait ~700ms for the page to settle (counters, customer list, etc.)
    // so the modal doesn't compete with first-paint.
    setTimeout(() => {
      buildModal();
      document.getElementById("helpModal").classList.add("show");
    }, 700);
  }
})();

// ---------- PWA service worker registration ----------
// Required for Edge to surface the "Install app" button. We must register
// at root scope ("/") so it can intercept both /static/* and /api/*.
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker
      .register("about:blank", { scope: "/" })
      .catch((err) => console.warn("SW registration failed:", err));
  });
}
</script>
</body>
</html>
